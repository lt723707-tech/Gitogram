<!DOCTYPE html>
<html lang="ru" data-theme="dark" data-accent="blue" data-font="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitogram</title>

    <!-- Внешние зависимости -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="config.js"></script>

    <style>
        /* ══════════════════════════════════════════════════════════
           ОСНОВНЫЕ ПЕРЕМЕННЫЕ И ТЕМЫ
           ══════════════════════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Тёмная тема (по умолчанию) */
        [data-theme="dark"] {
            --bg-dark: #0e1621;
            --bg-mid: #17212b;
            --bg-light: #242f3d;
            --bg-hover: #2b3a4c;
            --bubble-out: #2b5278;
            --bubble-in: #182533;
            --border: #1a2533;
            --text: #f5f5f5;
            --text-dim: #708499;
            --red: #e53935;
            --green: #43a047;
            --overlay: rgba(0, 0, 0, .55);
            --sidebar-bg: rgba(23, 33, 43, .92);
            --input-bg: rgba(23, 33, 43, .95);
            --glass: rgba(23, 33, 43, .85);
        }

        /* Светлая тема */
        [data-theme="light"] {
            --bg-dark: #e8ecf0;
            --bg-mid: #ffffff;
            --bg-light: #dfe4ea;
            --bg-hover: #d0d7de;
            --bubble-out: #e3f2fd;
            --bubble-in: #ffffff;
            --border: #c8ced6;
            --text: #1a1a1a;
            --text-dim: #6b7b8d;
            --red: #c62828;
            --green: #2e7d32;
            --overlay: rgba(0, 0, 0, .35);
            --sidebar-bg: rgba(255, 255, 255, .92);
            --input-bg: rgba(255, 255, 255, .95);
            --glass: rgba(255, 255, 255, .85);
        }

        /* AMOLED (чисто черный) */
        [data-theme="amoled"] {
            --bg-dark: #000000;
            --bg-mid: #0a0a0a;
            --bg-light: #151515;
            --bg-hover: #1a1a1a;
            --bubble-out: #1a3a5c;
            --bubble-in: #0d1117;
            --border: #1c1c1c;
            --text: #f0f0f0;
            --text-dim: #5a6a7a;
            --red: #e53935;
            --green: #43a047;
            --overlay: rgba(0, 0, 0, .75);
            --sidebar-bg: rgba(10, 10, 10, .95);
            --input-bg: rgba(10, 10, 10, .95);
            --glass: rgba(10, 10, 10, .9);
        }

        /* Акцентные цвета */
        [data-accent="blue"]   { --accent: #5288c1; --accent-light: #71a8e0; --accent-dark: #3a689b; }
        [data-accent="green"]  { --accent: #43a047; --accent-light: #66bb6a; --accent-dark: #2e7d32; }
        [data-accent="purple"] { --accent: #7e57c2; --accent-light: #9575cd; --accent-dark: #5e35b1; }
        [data-accent="red"]    { --accent: #e53935; --accent-light: #ef5350; --accent-dark: #c62828; }
        [data-accent="orange"] { --accent: #fb8c00; --accent-light: #ffa726; --accent-dark: #ef6c00; }
        [data-accent="pink"]   { --accent: #ec407a; --accent-light: #f06292; --accent-dark: #d81b60; }
        [data-accent="teal"]   { --accent: #00897b; --accent-light: #26a69a; --accent-dark: #00695c; }
        [data-accent="amber"]  { --accent: #ffb300; --accent-light: #ffc107; }

        /* Размеры шрифта */
        [data-font="small"]  { --fs: 13px; --fs-sm: 11px; --fs-xs: 10px; }
        [data-font="normal"] { --fs: 14px; --fs-sm: 12px; --fs-xs: 11px; }
        [data-font="large"]  { --fs: 16px; --fs-sm: 14px; --fs-xs: 12px; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            font-size: var(--fs);
        }

        /* ══════════════════════════════════════════════════════════
           ЭКРАН ПРИВЕТСТВИЯ / ЛОГИН
           ══════════════════════════════════════════════════════════ */
        .welcome-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .welcome-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            max-width: 92vw;
            box-shadow: 0 16px 64px rgba(0, 0, 0, .3);
            text-align: center;
            border: 1px solid var(--border);
        }

        .welcome-logo {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .welcome-card h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .welcome-card .subtitle {
            color: var(--text-dim);
            margin-bottom: 24px;
            font-size: var(--fs-sm);
        }

        /* Элементы форм */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--accent-light);
            font-size: var(--fs-xs);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: var(--fs);
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-dim);
            opacity: .5;
        }

        .form-hint {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 16px;
            font-size: var(--fs);
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 18px;
        }

        .btn-primary:hover {
            background: var(--accent-light);
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* Статус подключения */
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            font-size: var(--fs-sm);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.ok {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        .status-dot.err {
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
        }

        .status-dot.wait {
            background: #ff9800;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: .3; }
        }

        .error-box {
            background: rgba(229, 57, 53, .15);
            border: 1px solid rgba(229, 57, 53, .3);
            color: #ef9a9a;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: var(--fs-sm);
            margin-bottom: 16px;
            text-align: left;
        }

        /* ══════════════════════════════════════════════════════════
           ОСНОВНОЕ ПРИЛОЖЕНИЕ (Layout)
           ══════════════════════════════════════════════════════════ */
        .app {
            display: none;
            height: 100%;
            padding: 8px;
            gap: 8px;
        }

        .app.active {
            display: flex;
        }

        /* ═══ БОКОВАЯ ПАНЕЛЬ (Sidebar) ═══ */
        .sidebar {
            width: 340px;
            min-width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
        }

        .sidebar-header h2 {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-user {
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Список контактов/чатов */
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-light) transparent;
        }

        .contacts-list::-webkit-scrollbar {
            width: 4px;
        }

        .contacts-list::-webkit-scrollbar-thumb {
            background: var(--bg-light);
            border-radius: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            transition: all .15s;
            border-radius: 14px;
            margin-bottom: 2px;
        }

        .contact-item:hover {
            background: var(--bg-hover);
        }

        .contact-item.active {
            background: var(--accent-dark, var(--accent));
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            margin-right: 12px;
            text-transform: uppercase;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-info-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .contact-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .contact-item.active .contact-time {
            color: rgba(255, 255, 255, .6);
        }

        .contact-preview {
            font-size: var(--fs-sm);
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-item.active .contact-preview {
            color: rgba(255, 255, 255, .75);
        }

        .contact-badge {
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 7px;
            font-size: var(--fs-xs);
            font-weight: 600;
            flex-shrink: 0;
        }

        .contact-item.active .contact-badge {
            background: #fff;
            color: var(--accent);
        }

        .empty-contacts {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            padding: 24px;
            text-align: center;
        }

        .empty-contacts .empty-icon {
            font-size: 56px;
            margin-bottom: 14px;
            opacity: .3;
        }

        .sidebar-footer {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .conn-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .conn-dot-sm {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .conn-dot-sm.on {
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
        }

        .conn-dot-sm.off {
            background: var(--red);
        }

        /* ═══ ОБЛАСТЬ ЧАТА (Chat Area) ═══ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-dark);
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-bg {
            position: absolute;
            inset: 0;
            opacity: .08; /* Увеличено для лучшей видимости */
            pointer-events: none;
            z-index: 0;
        }

        .chat-bg.pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23888' fill-opacity='.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .chat-bg.circles {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='2' fill='%23888' fill-opacity='.2'/%3E%3C/svg%3E");
        }

        .chat-bg.waves {
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='40' viewBox='0 0 80 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20c10-10 30-10 40 0s30 10 40 0' stroke='%23888' stroke-opacity='.15' fill='none'/%3E%3C/svg%3E");
        }

        .chat-bg.stars {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1' fill='%23fff' fill-opacity='.2'/%3E%3Ccircle cx='50' cy='40' r='1.5' fill='%23fff' fill-opacity='.15'/%3E%3Ccircle cx='90' cy='80' r='1' fill='%23fff' fill-opacity='.2'/%3E%3C/svg%3E");
        }

        .chat-bg.none {
            display: none;
        }

        .chat-header {
            padding: 10px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
            z-index: 2;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-header-sub {
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .chat-header-actions {
            display: flex;
            gap: 2px;
        }

        /* ══════════════════════════════════════════════════════════
           СООБЩЕНИЯ (Messages)
           ══════════════════════════════════════════════════════════ */
        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 80px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(128, 128, 128, .15) transparent;
        }

        .messages-wrap::-webkit-scrollbar {
            width: 4px;
        }

        .messages-wrap::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, .15);
            border-radius: 4px;
        }

        .msg {
            max-width: 62%;
            margin-bottom: 3px;
            animation: msgSlide .25s ease-out;
        }

        .msg.gap { margin-bottom: 10px; }
        .msg.has-media { max-width: 380px; }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.out { align-self: flex-end; }
        .msg.in { align-self: flex-start; }

        .msg-bubble {
            padding: 8px 12px 6px;
            border-radius: 18px;
            font-size: var(--fs);
            line-height: 1.45;
            overflow: hidden;
        }

        .msg.out .msg-bubble {
            background: var(--bubble-out);
            border-bottom-right-radius: 6px;
        }

        .msg.in .msg-bubble {
            background: var(--bubble-in);
            border-bottom-left-radius: 6px;
        }

        .msg-sender {
            font-size: var(--fs-xs);
            font-weight: 700;
            margin-bottom: 1px;
        }

        .msg-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-text a {
            color: var(--accent-light);
            text-decoration: underline;
            text-underline-offset: 2px;
            font-weight: 500;
            transition: opacity .2s;
        }

        .msg-text a:hover {
            opacity: .8;
        }

        [data-theme="dark"] .msg-text a,
        [data-theme="amoled"] .msg-text a {
            color: #4fc3f7; /* Более светлый голубой для лучшей видимости */
        }

        .msg-text code {
            background: rgba(255, 255, 255, .1);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            color: var(--accent-light);
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .msg-time {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            opacity: .6;
        }

        .msg-edited {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            opacity: .5;
            font-style: italic;
        }

        /* Разделитель дат */
        .date-sep {
            text-align: center;
            margin: 14px 0;
            align-self: center;
        }

        .date-sep span {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 5px 16px;
            border-radius: 14px;
            font-size: var(--fs-xs);
            color: var(--text-dim);
            font-weight: 500;
        }

        .empty-messages {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            flex-direction: column;
            text-align: center;
            gap: 8px;
        }

        /* Цитаты и пересылки */
        .msg-reply-quote {
            background: rgba(255, 255, 255, .07);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 5px 10px;
            margin-bottom: 4px;
            font-size: var(--fs-sm);
        }

        .msg-reply-quote .rq-name {
            font-weight: 700;
            color: var(--accent-light);
            font-size: var(--fs-xs);
        }

        .msg-reply-quote .rq-text {
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .msg-forward-header {
            font-size: var(--fs-xs);
            color: var(--accent-light);
            font-style: italic;
            margin-bottom: 2px;
        }

        /* Медиа-контент */
        .msg-media {
            margin: 4px -4px;
            border-radius: 12px;
            overflow: hidden;
        }

        .msg-media img {
            display: block;
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity .3s;
            background: var(--bg-light);
        }

        .msg-media img.loading {
            opacity: .3;
            min-height: 100px;
        }

        .msg-media:hover img {
            opacity: .85;
        }

        .msg-media video {
            display: block;
            width: 100%;
            max-height: 360px;
            border-radius: 12px;
            background: #000;
        }

        .msg-media audio {
            width: 100%;
            max-width: 300px;
            height: 40px;
            margin: 4px 0;
        }

        /* Карточка файла */
        .msg-file-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, .12);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            cursor: pointer;
            transition: background .15s;
            color: inherit;
        }

        .msg-file-card:hover {
            background: rgba(0, 0, 0, .25);
        }

        .file-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .file-icon.ic-img { background: #e91e63; }
        .file-icon.ic-vid { background: #9c27b0; }
        .file-icon.ic-aud { background: #ff9800; }
        .file-icon.ic-def { background: var(--accent); }

        .file-info {
            min-width: 0;
            flex: 1;
        }

        .file-name {
            font-size: var(--fs-sm);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            margin-top: 1px;
        }

        .file-dl-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff;
            font-size: 14px;
        }

        /* Большая кнопка импорта (если сообщение состоит только из инвайта) */
        .import-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, .12);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            cursor: pointer;
            transition: background .15s;
            color: inherit;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            min-width: 200px;
        }
        .import-chat-btn:hover { background: rgba(0, 0, 0, .25); }

        .import-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--accent);
            color: #fff;
            flex-shrink: 0;
        }

        .import-text { min-width: 0; flex: 1; }
        .import-title {
            font-size: var(--fs-sm);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .import-name {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Инлайн кнопка (внутри текста) */
        .inline-import-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            font-family: inherit;
            vertical-align: middle;
            margin: 0 4px;
            line-height: 1.2;
            text-decoration: none;
        }
        .inline-import-btn:hover { opacity: 0.85; }
        .inline-import-btn:active { transform: scale(0.96); }

        .msg-caption {
            margin-top: 4px;
        }

        /* ══════════════════════════════════════════════════════════
           ПАНЕЛИ ДЕЙСТВИЙ И ПРЕВЬЮ
           ══════════════════════════════════════════════════════════ */
        /* Панель ответа/редактирования */
        .action-bar {
            display: none;
            padding: 8px 20px;
            z-index: 3;
            align-items: center;
            gap: 10px;
            position: absolute;
            bottom: 72px;
            left: 12px;
            right: 12px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .action-bar.active { display: flex; }

        .action-bar-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .action-bar-content {
            flex: 1;
            min-width: 0;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .action-bar-title {
            font-size: var(--fs-xs);
            font-weight: 700;
            color: var(--accent-light);
        }

        .action-bar-text {
            font-size: var(--fs-sm);
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-bar-close {
            width: 28px;
            height: 28px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .action-bar-close:hover { color: var(--text); }

        /* Превью прикрепленных файлов */
        .file-preview-bar {
            display: none;
            position: absolute;
            bottom: 72px;
            left: 12px;
            right: 12px;
            padding: 8px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--border);
            z-index: 3;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .file-preview-bar.active { display: flex; }

        .fp-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 6px 10px;
            flex-shrink: 0;
        }

        .fp-thumb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-light);
        }

        .fp-name {
            font-size: var(--fs-xs);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .fp-remove {
            width: 20px;
            height: 20px;
            border: none;
            background: var(--red);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ══════════════════════════════════════════════════════════
           ПОЛЕ ВВОДА (Input Bar)
           ══════════════════════════════════════════════════════════ */
        .input-area {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-bar {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: var(--input-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 4px;
            gap: 4px;
            transition: border-color .2s;
            position: relative;
        }

        .input-bar:focus-within {
            border-color: var(--accent);
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
            flex-shrink: 0;
        }

        .attach-btn:hover { color: var(--text); }
        .attach-btn svg { width: 22px; height: 22px; }

        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 36px 8px 4px;
            color: var(--text);
            font-size: var(--fs);
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 36px;
            line-height: 1.4;
            font-family: inherit;
        }

        .msg-input::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            position: absolute;
            right: 6px;
            bottom: 6px;
        }

        .send-btn svg { width: 18px; height: 18px; }

        .send-btn:hover {
            background: var(--accent-light);
            transform: scale(1.08);
        }

        .send-btn:active {
            transform: scale(.95);
        }
        .send-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg { width: 20px; height: 20px; }

        /* ══════════════════════════════════════════════════════════
           КОНТЕКСТНЫЕ МЕНЮ (Context Menus)
           ══════════════════════════════════════════════════════════ */
        .ctx-menu {
            display: none;
            position: fixed;
            z-index: 200;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 0;
            min-width: 190px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
            animation: ctxPop .15s ease-out;
        }

        .ctx-menu.active { display: block; }

        @keyframes ctxPop {
            from { opacity: 0; transform: scale(.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .ctx-item {
            padding: 10px 16px;
            font-size: var(--fs-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background .1s;
            border-radius: 0;
        }

        .ctx-item:first-child { border-radius: 10px 10px 0 0; }
        .ctx-item:last-child { border-radius: 0 0 10px 10px; }
        .ctx-item:hover { background: var(--bg-hover); }
        .ctx-item.danger { color: var(--red); }

        .ctx-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ══════════════════════════════════════════════════════════
           ОВЕРЛЕИ (Overlays)
           ══════════════════════════════════════════════════════════ */
        /* Перетаскивание файлов */
        .drag-overlay {
            display: none;
            position: absolute;
            inset: 8px;
            z-index: 50;
            background: rgba(14, 22, 33, .92);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 3px dashed var(--accent);
            border-radius: 20px;
        }

        .drag-overlay.active { display: flex; }

        .drag-overlay .drag-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: .7;
        }

        .drag-overlay p {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-light);
        }

        /* Оверлей загрузки */
        .upload-overlay {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 55;
            background: rgba(14, 22, 33, .95);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
        }

        .upload-overlay.active { display: flex; }

        .upload-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--bg-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .upload-overlay p { font-size: 15px; color: var(--text-dim); }
        .upload-name {
            font-size: var(--fs-sm);
            color: var(--accent-light);
            margin-top: 6px;
        }

        /* ══════════════════════════════════════════════════════════
           ЛАЙТБОКС (Lightbox)
           ══════════════════════════════════════════════════════════ */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, .92);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        .lightbox.active { display: flex; }

        .lightbox img, .lightbox video {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 12px;
            cursor: default;
        }

        .lb-btn {
            position: fixed;
            top: 16px;
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(10px);
            color: #fff;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-btn:hover { background: rgba(255, 255, 255, .25); }
        #lightboxClose { right: 16px; }
        #lightboxDl {
            right: 70px;
            font-size: 18px;
            text-decoration: none;
            color: #fff;
        }

        /* ══════════════════════════════════════════════════════════
           ЗАГЛУШКИ И МОДАЛЬНЫЕ ОКНА
           ══════════════════════════════════════════════════════════ */
        .no-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            z-index: 1;
        }

        .no-chat .big-icon {
            font-size: 80px;
            opacity: .12;
            margin-bottom: 20px;
        }

        .no-chat h3 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* Общие стили модалок */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 28px;
            width: 460px;
            max-width: 92vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 16px 64px rgba(0, 0, 0, .4);
            animation: modalPop .2s ease-out;
            border: 1px solid var(--border);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(.92) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .gen-key-btn {
            font-size: var(--fs-xs);
            color: var(--accent-light);
            background: 0 0;
            border: none;
            cursor: pointer;
            padding: 4px 0;
        }

        .gen-key-btn:hover { text-decoration: underline; }

        .key-box {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: var(--fs-xs);
            background: var(--bg-dark);
            padding: 8px 12px;
            border-radius: 12px;
            color: var(--accent-light);
            word-break: break-all;
            margin-top: 4px;
            border: 1px solid var(--border);
            user-select: all;
        }

        /* ══════════════════════════════════════════════════════════
           НАСТРОЙКИ (Settings Sections)
           ══════════════════════════════════════════════════════════ */
        .settings-section { margin-bottom: 24px; }

        .settings-section h4 {
            font-size: var(--fs-sm);
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-row:last-child { border-bottom: none; }

        /* Выбор цвета и темы */
        .color-picker { display: flex; gap: 6px; flex-wrap: wrap; }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all .15s;
        }

        .color-dot:hover { transform: scale(1.15); }
        .color-dot.active { border-color: var(--text); transform: scale(1.1); }

        .theme-picker { display: flex; gap: 8px; }

        .theme-opt {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--border);
            font-size: var(--fs-sm);
            font-weight: 600;
            transition: all .15s;
            user-select: none;
        }

        .theme-opt:hover { border-color: var(--accent); }
        .theme-opt.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .bg-picker { display: flex; gap: 8px; }

        .bg-opt {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .bg-opt:hover { transform: scale(1.1); }
        .bg-opt.active { border-color: var(--accent); }

        /* Переключатель (Toggle) */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-dark);
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .toggle.on {
            background: var(--accent);
            border-color: var(--accent);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            transition: left .2s;
        }

        .toggle.on::after { left: 22px; }

        /* Цвета имен отправителей */
        .sender-0 { color: #ff7043; }
        .sender-1 { color: #ab47bc; }
        .sender-2 { color: #5c6bc0; }
        .sender-3 { color: #29b6f6; }
        .sender-4 { color: #26a69a; }
        .sender-5 { color: #9ccc65; }
        .sender-6 { color: #ffa726; }
        .sender-7 { color: #ec407a; }

        /* Уведомления (Toast) */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 16px;
            font-size: var(--fs);
            z-index: 400;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
            transition: transform .3s ease;
            pointer-events: none;
            border: 1px solid var(--border);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--red); color: #fff; border-color: var(--red); }
        .toast.success { background: var(--green); color: #fff; border-color: var(--green); }

        /* Адаптивность */
        @media(max-width:768px) {
            .app { padding: 0; gap: 0; }
            .sidebar { width: 100%; min-width: 100%; border-radius: 0; }
            .app.chat-open .sidebar { display: none; }
            .chat-area { display: none; border-radius: 0; }
            .app.chat-open .chat-area { display: flex; }
            .back-btn { display: flex !important; }
            .msg { max-width: 85%; }
            .msg.has-media { max-width: 80vw; }
            .input-area { bottom: 6px; left: 6px; right: 6px; }
        }

        .back-btn { display: none; }
    </style>
</head>
<body>

    <!-- Экран приветствия -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-card">
            <div class="welcome-logo">🔐</div>
            <h1>Gitogram</h1>
            <p class="subtitle" data-t="subtitle"></p>

            <div id="configStatus" class="status-line">
                <span class="status-dot wait"></span>
                <span data-t="checking"></span>
            </div>

            <div id="configError" class="error-box" style="display:none"></div>

            <div id="nameForm" style="display:none">
                <div class="form-group">
                    <label data-t="your_name"></label>
                    <input type="text" id="inputUsername" data-tp="enter_name">
                </div>
                <div class="form-group">
                    <label data-t="password"></label>
                    <input type="password" id="inputPassword" data-tp="enter_password">
                    <div class="form-hint">При первом входе этот пароль станет вашим постоянным.</div>
                </div>
                <button class="btn btn-primary" id="btnStartApp" data-t="login"></button>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="mainApp" class="app">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div>
                    <h2><span style="font-size:20px">🔐</span> Gitogram</h2>
                    <div class="sidebar-user" id="sidebarUser"></div>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="btnAddChat" title="Новый чат">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="btnSettings" title="Настройки">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        const linkify = t => {
            // 1. Инлайн код: `текст`
            let res = t.replace(/`(.*?)`/g, '<code>$1</code>');
            
            // 2. Жирный, курсив, подчеркнутый (Markdown)
            res = res
                .replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>') // Жирный курсив
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')         // Жирный
                .replace(/\*(.*?)\*/g, '<i>$1</i>')             // Курсив
                .replace(/__(.*?)__/g, '<u>$1</u>');            // Подчеркнутый

            const links = [];

            // 3. Инлайн-импорт чата: [Текст](gitogram:addchat{...})
            res = res.replace(/\[([^\]]+)\]\(gitogram:addchat(\{(?:[^{}]|(?:\{[^{}]*\}))*\})\)/g, (m, txt, json) => {
                try {
                    const d = document.createElement('textarea');
                    d.innerHTML = json;
                    const cleanJson = d.value;
                    JSON.parse(cleanJson); // validate
                    const safeStr = btoa(unescape(encodeURIComponent(cleanJson)));
                    links.push(`<button class="inline-import-btn" onclick="app.handleTextImport('${safeStr}')">${txt}</button>`);
                    return `__LINK_${links.length - 1}__`;
                } catch (e) { return m; }
            });

            // 4. Инлайн-импорт чата: gitogram:addchat{...}
            res = res.replace(/gitogram:addchat(\{(?:[^{}]|(?:\{[^{}]*\}))*\})/g, (m, json) => {
                try {
                    const d = document.createElement('textarea');
                    d.innerHTML = json;
                    const cleanJson = d.value;
                    const parsed = JSON.parse(cleanJson);
                    const chatName = (parsed.chat && parsed.chat.name) ? parsed.chat.name : 'Чат';
                    const safeStr = btoa(unescape(encodeURIComponent(cleanJson)));
                    links.push(`<button class="inline-import-btn" onclick="app.handleTextImport('${safeStr}')">📥 ${esc(chatName)}</button>`);
                    return `__LINK_${links.length - 1}__`;
                } catch (e) { return m; }
            });

            // 5. Текстовые ссылки [текст](url)
            // Используем временные плейсхолдеры, чтобы не линковать URL дважды
            res = res.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, (m, txt, url) => {
                links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">${txt}</a>`);
                return `__LINK_${links.length - 1}__`;
            });

            // 6. Автоматическое превращение оставшихся URL в ссылки
            const urlRe = /(https?:\/\/[^\s<]+)/g;
            res = res.replace(urlRe, m => {
                links.push(`<a href="${m}" target="_blank" rel="noopener noreferrer">${m}</a>`);
                return `__LINK_${links.length - 1}__`;
            });

            // 7. Возвращаем все ссылки на место
            links.forEach((html, i) => {
                res = res.replace(`__LINK_${i}__`, html);
            });

            return res;
        };
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
        const stripMd = t => {
            if (!t) return '';
            return t
                .replace(/\[(.*?)\]\(.*?\)/g, '$1') // Текстовые ссылки [текст](url) -> текст
                .replace(/(\*\*\*|\*\*|\*|__)(.*?)\1/g, '$2') // Жирный, курсив, подчеркнутый
                .replace(/`(.*?)`/g, '$1'); // Инлайн код
        };
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        /**
         * Форматирование времени и даты
         */
        function fmtTime(ts) {
            const d = new Date(ts), n = new Date();
            const locale = settings.lang === 'en' ? 'en-US' : 'ru-RU';
            if (d.toDateString() === n.toDateString()) {
                return d.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
            }
            const y = new Date(n);
            y.setDate(y.getDate() - 1);
            if (d.toDateString() === y.toDateString()) return t('yesterday');
            return d.toLocaleDateString(locale, { day: '2-digit', month: '2-digit' });
        }

        function fmtSize(b) {
            if (!b) return '';
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }

        /**
         * Модуль шифрования (Crypto Wrapper)
         */
        const Enc = {
            encrypt: (t, k) => CryptoJS.AES.encrypt(t, k).toString(),
            decrypt(c, k) {
                try {
                    return CryptoJS.AES.decrypt(c, k).toString(CryptoJS.enc.Utf8) || null;
                } catch {
                    return null;
                }
            },
            hash: t => CryptoJS.SHA256(t).toString().slice(0, 16),
            randomKey(n = 32) {
                const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                const a = new Uint8Array(n);
                crypto.getRandomValues(a);
                return Array.from(a, v => c[v % c.length]).join('');
            }
        };

        /**
         * Локальное хранилище (LocalStorage Wrapper)
         */
        const Store = {
            set(k, v) { localStorage.setItem('gito_' + k, JSON.stringify(v)) },
            get(k, d = null) {
                const v = localStorage.getItem('gito_' + k);
                if (!v) return d;
                try { return JSON.parse(v) } catch { return v }
            },
            clear() {
                Object.keys(localStorage).filter(k => k.startsWith('gito_')).forEach(k => localStorage.removeItem(k));
            }
        };

        /**
         * Утилиты для работы с файлами
         */
        const EXT = {
            images: ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'svg'],
            videos: ['mp4', 'webm', 'mov', 'avi', 'mkv'],
            audios: ['mp3', 'ogg', 'wav', 'flac', 'aac', 'm4a'],
            _ext(n) {
                if (!n) return '';
                const p = n.split('.');
                return p.length > 1 ? p.pop().toLowerCase() : '';
            },
            isImage(n) { return this.images.includes(this._ext(n)) },
            isVideo(n) { return this.videos.includes(this._ext(n)) },
            isAudio(n) { return this.audios.includes(this._ext(n)) },
            emoji(n) {
                if (this.isImage(n)) return '🖼';
                if (this.isVideo(n)) return '🎬';
                if (this.isAudio(n)) return '🎵';
                return '📄';
            },
            iconClass(n) {
                if (this.isImage(n)) return 'ic-img';
                if (this.isVideo(n)) return 'ic-vid';
                if (this.isAudio(n)) return 'ic-aud';
                return 'ic-def';
            }
        };

        // Настройки по умолчанию
        const DEF = { theme: 'dark', accent: 'blue', bg: 'pattern', fontSize: 'normal', lang: 'ru', pollInterval: 5, enterSend: true };
        let settings = Object.assign({}, DEF, Store.get('settings', {}));

        // Локализация строк
        function t(k) { return (I18N[settings.lang] || I18N.ru)[k] || k }

        function applyI18n() {
            document.querySelectorAll('[data-t]').forEach(el => el.textContent = t(el.dataset.t));
            document.querySelectorAll('[data-tp]').forEach(el => el.placeholder = t(el.dataset.tp));

        /**
         * API GitHub для работы с файлами и репозиторием
         */
        class GitHub {
            constructor(token, repo, path) {
                this.token = token;
                [this.owner, this.repo] = repo.split('/');
                this.path = path;
                this.sha = null;
            }

            get h() {
                return {
                    Authorization: `token ${this.token}`,
                    Accept: 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };
            }

            _enc(s) {
                const b = new TextEncoder().encode(s);
                let r = '';
                b.forEach(c => r += String.fromCharCode(c));
                return btoa(r);
            }

            _dec(b) {
                const s = atob(b.replace(/[\n\r]/g, ''));
                const a = new Uint8Array(s.length);
                for (let i = 0; i < s.length; i++) a[i] = s.charCodeAt(i);
                return new TextDecoder().decode(a);
            }

            async getFile(customPath = null) {
                const path = customPath || this.path;
                try {
                    const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, { headers: this.h, cache: 'no-store' });
                    if (r.status === 404) return null;
                    if (!r.ok) throw new Error(r.status);
                    const d = await r.json();
                    if (!customPath) this.sha = d.sha;
                    return { data: JSON.parse(this._dec(d.content)), sha: d.sha };
                } catch (e) {
                    console.error('Fetch error:', e);
                    throw e;
                }
            }

            async saveFile(data, customPath = null, customSha = null) {
                const path = customPath || this.path;
                const sha = customSha || (customPath ? null : this.sha);
                const url = `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`;
                const body = { message: 'g', content: this._enc(JSON.stringify(data, null, 0)) };
                if (sha) body.sha = sha;
                const r = await fetch(url, { method: 'PUT', headers: this.h, body: JSON.stringify(body) });
                if (!r.ok) throw new Error(r.status);
                const res = await r.json();
                if (!customPath) this.sha = res.content.sha;
                return res.content.sha;
            }

            async upload(path, b64) {
                const url = `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`;
                let sha = null;
                try {
                    const c = await fetch(url, { headers: this.h });
                    if (c.ok) sha = (await c.json()).sha;
                } catch { };
                const body = { message: 'f', content: b64 };
                if (sha) body.sha = sha;
                await fetch(url, { method: 'PUT', headers: this.h, body: JSON.stringify(body) });
            }

            async getBlob(path) {
                const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, {
                    headers: {
                        Authorization: `token ${this.token}`,
                        Accept: 'application/vnd.github.raw'
                    },
                    cache: 'no-store'
                });
                if (!r.ok) throw new Error(r.status);
                return await r.blob();
            }

            async test() {
                return (await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}`, { headers: this.h })).ok;
            }
        }

        /**
         * Главный класс приложения Gitogram
         */
        class Gitogram {
            constructor() {
                this.gh = null;
                this.username = '';
                this.userAvatar = '';
                this.profilesCache = {};
                this.chats = [];
                this.curChat = null;
                this.msgs = [];
                this.renderedIds = new Set();
                this.renderedHashes = new Map();
                this.poll = null;
                this.senderColors = {};
                this.colorIdx = 0;
                this.fileCache = new Map();
                this.pendingFiles = [];
                this.dragCounter = 0;
                this.MAX_FILE = 50 * 1024 * 1024;
                this.lastSig = '';
                this.replyTo = null;
                this.editingMsg = null;
                this.ctxMsg = null;
                this.ctxChatId = null;
                this.decodedCache = [];

                this.bind();
                this.applySettings();
                this.init();
            }

            // Общий метод импорта чата
            doImportChat(name, key) {
                const id = Enc.hash(key);
                if (this.chats.find(c => c.id === id)) return this.toast(t('chat_exists'), 'error');
                
                const colors = ['#e53935', '#8e24aa', '#5c6bc0', '#039be5', '#00897b', '#43a047', '#ef6c00', '#6d4c41', '#ec407a', '#7e57c2'];
                this.chats.push({ id, name, key, color: colors[this.chats.length % colors.length] });
                
                this.saveChats();
                this.toast(t('new_chat') + ': ' + name, 'success');
                this.selectChat(id);
            }

            // Применение визуальных настроек
            applySettings() {
                document.documentElement.setAttribute('data-theme', settings.theme);
                document.documentElement.setAttribute('data-accent', settings.accent);
                document.documentElement.setAttribute('data-font', settings.fontSize);
                const bg = $('chatBg');
                if (bg) bg.className = 'chat-bg ' + (settings.bg || 'pattern');
                applyI18n();
                const mi = $('msgInput');
                if (mi) mi.placeholder = t('message');
            }

            // Инициализация при запуске
            async init() {
                const st = $('configStatus'), er = $('configError');
                if (typeof GITOGRAM_CONFIG === 'undefined') {
                    st.innerHTML = '<span class="status-dot err"></span><span>config.js!</span>';
                    return;
                }
                const cfg = GITOGRAM_CONFIG;
                if (!cfg.token || !cfg.repo) {
                    st.innerHTML = '<span class="status-dot err"></span><span>Error</span>';
                    er.style.display = 'block';
                    er.textContent = 'token/repo';
                    return;
                }
                st.innerHTML = `<span class="status-dot wait"></span><span>${t('checking')}</span>`;
                try {
                    this.gh = new GitHub(cfg.token, cfg.repo, cfg.file || 'messages.json');
                    const testResult = await this.gh.test();
                    if (!testResult) {
                        st.innerHTML = '<span class="status-dot err"></span><span>✗</span>';
                        er.style.display = 'block';
                        er.textContent = 'Repo not found or Token invalid';
                        return;
                    }
                    st.innerHTML = '<span class="status-dot ok"></span><span>GitHub ✓</span>';
                    this.username = Store.get('username', '');
                    this.userAvatar = Store.get('userAvatar', '');
                    this.chats = Store.get('chats', []);
                    if (this.username) this.enterApp();
                    else $('nameForm').style.display = 'block';
                } catch (e) {
                    st.innerHTML = '<span class="status-dot err"></span><span>✗</span>';
                    er.style.display = 'block';
                    er.textContent = e.message;
                }
            }

            // Вход в основную часть приложения
            async setUsername() {
                const n = $('inputUsername').value.trim(), p = $('inputPassword').value.trim();
                if (!n || !p) return this.toast(t('enter_name'), 'error');

                const btn = $('btnStartApp');
                btn.disabled = true;

                try {
                    const res = await this.gh.getFile('profiles.json');
                    let profiles = res ? res.data || {} : {};
                    const ph = Enc.hash(p);

                    if (profiles[n]) {
                        if (profiles[n].pass !== ph) {
                            btn.disabled = false;
                            return this.toast(t('wrong_password'), 'error');
                        }
                    } else {
                        profiles[n] = { pass: ph, avatar: '' };
                        await this.gh.saveFile(profiles, 'profiles.json', res ? res.sha : null);
                    }

                    this.username = n;
                    this.userAvatar = profiles[n].avatar || '';
                    Store.set('username', n);
                    Store.set('userAvatar', this.userAvatar);
                    this.enterApp();
                } catch (e) {
                    this.toast(e.message, 'error');
                } finally {
                    btn.disabled = false;
                }
            }

            enterApp() {
                $('welcomeScreen').style.display = 'none';
                $('mainApp').classList.add('active');
                this.updateSidebarUser();
                this.renderChats();
                this.startPoll();
            }

            updateSidebarUser() {
                const el = $('sidebarUser');
                if (this.userAvatar) {
                    el.innerHTML = `<img src="${this.userAvatar}" style="width:20px;height:20px;border-radius:50%;object-fit:cover"> ${esc(this.username)}`;
                } else {
                    el.textContent = '👤 ' + this.username;
                }
            }

            /**
             * Привязка событий (Event Listeners)
             */
            bind() {
                // Логин
                $('btnStartApp').onclick = () => this.setUsername();
                $('inputUsername').onkeydown = e => { if (e.key === 'Enter') this.setUsername() };

                $('tabCreateChat').onclick = () => this.switchAddChatTab('create');
                $('tabImportChat').onclick = () => this.switchAddChatTab('import');

                // Чат
                $('btnInviteChat').onclick = () => this.inviteChat();
                $('btnShowKey').onclick = () => this.showKey();
                $('btnDeleteChat').onclick = () => { if (this.curChat && confirm(t('confirm_delete_chat'))) this.deleteChat(this.curChat.id) };

                // Ввод сообщений
                $('msgInput').onkeydown = e => {
                    if (e.key === 'Enter' && !e.shiftKey && settings.enterSend) {
                        e.preventDefault();
                        this.send();
                    }
                };
                $('msgInput').oninput = () => this.autoResize($('msgInput'));
                $('sendBtn').onclick = () => this.send();

                // Файлы
                $('attachBtn').onclick = () => $('fileInput').click();
                $('fileInput').onchange = e => { if (e.target.files.length) this.attachFiles([...e.target.files]); e.target.value = '' };
                $('avatarInput').onchange = e => { if (e.target.files.length) this.uploadAvatar(e.target.files[0]) };
                $('actionClose').onclick = () => this.cancelAction();

                // Paste & Drag-n-Drop
                document.addEventListener('paste', e => {
                    if (!this.curChat) return;
                    const files = [];
                    for (const i of (e.clipboardData?.items || [])) if (i.kind === 'file') files.push(i.getAsFile());
                    if (files.length) { e.preventDefault(); this.attachFiles(files) }
                });

                const ca = $('chatArea');
                ca.addEventListener('dragenter', e => {
                    e.preventDefault();
                    this.dragCounter++;
                    if (this.curChat) $('dragOverlay').classList.add('active');
                });
                ca.addEventListener('dragleave', e => {
                    e.preventDefault();
                    this.dragCounter--;
                    if (this.dragCounter <= 0) { this.dragCounter = 0; $('dragOverlay').classList.remove('active') }
                });
                ca.addEventListener('dragover', e => e.preventDefault());
                ca.addEventListener('drop', e => {
                    e.preventDefault();
                    this.dragCounter = 0;
                    $('dragOverlay').classList.remove('active');
                    if (this.curChat && e.dataTransfer.files.length) this.attachFiles([...e.dataTransfer.files]);

                $('lightboxClose').onclick = (e) => { e.stopPropagation(); this.closeLightbox() };

                // Контекстное меню чатов (через делегирование)
                $('chatCtxMenu').onclick = e => {
                    const item = e.target.closest('.ctx-item');
                    if (item) this.chatCtxAction(item.dataset.chataction);

                // Контекстное меню сообщений
                $('ctxMenu').onclick = e => {
                    const item = e.target.closest('.ctx-item');

                // Модалка пересылки
                $('forwardList').onclick = e => {
