        /**
         * API GitHub для работы с файлами и репозиторием
         */
        class GitHub {
            constructor(token, repo, path) {
                this.token = token;
                [this.owner, this.repo] = repo.split('/');
                this.path = path;
                this.sha = null;
            }

            get h() {
                return {
                    Authorization: `token ${this.token}`,
                    Accept: 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };
            }

            _enc(s) {
                const b = new TextEncoder().encode(s);
                let r = '';
                b.forEach(c => r += String.fromCharCode(c));
                return btoa(r);
            }

            _dec(b) {
                const s = atob(b.replace(/[\n\r]/g, ''));
                const a = new Uint8Array(s.length);
                for (let i = 0; i < s.length; i++) a[i] = s.charCodeAt(i);
                return new TextDecoder().decode(a);
            }

            async getFile(customPath = null) {
                const path = customPath || this.path;
                try {
                    const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, { headers: this.h, cache: 'no-store' });
                    if (r.status === 404) return null;
                    if (!r.ok) throw new Error(r.status);
                    const d = await r.json();
                    if (!customPath) this.sha = d.sha;
                    return { data: JSON.parse(this._dec(d.content)), sha: d.sha };
                } catch (e) {
                    console.error('Fetch error:', e);
                    throw e;
                }
            }

            async saveFile(data, customPath = null, customSha = null) {
                const path = customPath || this.path;
                const sha = customSha || (customPath ? null : this.sha);
                const url = `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`;
                const body = { message: 'g', content: this._enc(JSON.stringify(data, null, 0)) };
                if (sha) body.sha = sha;
                const r = await fetch(url, { method: 'PUT', headers: this.h, body: JSON.stringify(body) });
                if (!r.ok) throw new Error(r.status);
                const res = await r.json();
                if (!customPath) this.sha = res.content.sha;
                return res.content.sha;
            }

            async upload(path, b64) {
                const url = `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`;
                let sha = null;
                try {
                    const c = await fetch(url, { headers: this.h });
                    if (c.ok) sha = (await c.json()).sha;
                } catch { };
                const body = { message: 'f', content: b64 };
                if (sha) body.sha = sha;
                await fetch(url, { method: 'PUT', headers: this.h, body: JSON.stringify(body) });
            }

            async getBlob(path) {
                const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, {
                    headers: {
                        Authorization: `token ${this.token}`,
                        Accept: 'application/vnd.github.raw'
                    },
                    cache: 'no-store'
                });
                if (!r.ok) throw new Error(r.status);
                return await r.blob();
            }

            async test(signal) {
                return (await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}`, { headers: this.h, cache: 'no-store', signal })).ok;
            }
        }

            async sendSys(chatId, action) {
                const chat = this.chats.find(c => c.id === chatId);
                if (!chat) return;
                const p = { s: this.username, sys: action };
                const enc = Enc.encrypt(JSON.stringify(p), chat.key);
                const nm = { id: uid(), ch: chat.id, d: enc, t: Date.now() };
                try {
                    const res = await this.gh.getFile();
                    const data = (res && res.data) ? res.data : { messages: [] };
                    if (!data.messages) data.messages = [];
                    data.messages.push(nm);
                    await this.gh.saveFile(data, null, res ? res.sha : null);
                    if (this.curChat && this.curChat.id === chatId) this.fetchMessages();
                } catch (e) { console.error(e) }
            }

            async sendVoice(b64, ext, mime) {
                if (!this.curChat) return;
                const path = `gitogram_voice/${uid()}.${ext}`;
                try {
                    const encrypted = Enc.encrypt(b64, this.curChat.key);
                    const encB64 = btoa(unescape(encodeURIComponent(encrypted)));
                    await this.gh.upload(path, encB64);
                    
                    const p = { s: this.username, voice: { p: path, t: mime } };
                    const enc = Enc.encrypt(JSON.stringify(p), this.curChat.key);
                    const nm = { id: uid(), ch: this.curChat.id, d: enc, t: Date.now() };
                    
                    const res = await this.gh.getFile();
                    const data = (res && res.data) ? res.data : { messages: [] };
                    if (!data.messages) data.messages = [];
                    data.messages.push(nm);
                    await this.gh.saveFile({ messages: data.messages.slice(-2000) }, null, res ? res.sha : null);
                    this.fetchMessages();
                } catch (e) { this.toast('Ошибка голосового сообщения', 'error') }
            }

            // Общий метод импорта чата
            doImportChat(name, key) {
                const id = Enc.hash(key);
                const existing = this.chats.find(c => c.id === id);
                
                if (existing) {
                    this.saveChats();
                    this.selectChat(id);
                    return;
                }
                
                const colors = ['#e53935', '#8e24aa', '#5c6bc0', '#039be5', '#00897b', '#43a047', '#ef6c00', '#6d4c41', '#ec407a', '#7e57c2'];
                this.chats.push({ 
                    id, name, key, 
                    color: colors[this.chats.length % colors.length] 
                });
                
                this.saveChats();
                this.toast('💬 ' + (t('new_chat') + ': ' + name), 'success');
                this.selectChat(id);
                this.sendSys(id, 'join');
            }

            // Применение визуальных настроек
            applySettings() {
                const customs = settings.customThemes || [];
                const theme = customs.find(t => t.theme_id === settings.theme);
                
                if (theme) {
                    this.applyCustomTheme(theme);
                } else if (settings.theme === 'custom' && settings.customTheme) {
                    this.applyCustomTheme(settings.customTheme);
                } else {
                    document.documentElement.setAttribute('data-theme', settings.theme);
                    $('customThemeStyle').innerHTML = '';
                }
                document.documentElement.setAttribute('data-accent', settings.accent);
                document.documentElement.setAttribute('data-font', settings.fontSize);
                const bg = $('chatBg');
                if (bg) bg.className = 'chat-bg ' + (settings.bg || 'pattern');
                
                const curName = $('curThemeName');
                if (curName) {
                    const themeObj = customs.find(t => t.theme_id === settings.theme);
                    curName.textContent = themeObj ? themeObj.name : (settings.theme.charAt(0).toUpperCase() + settings.theme.slice(1));
                }

                applyI18n();
                const mi = $('msgInput');
                if (mi) mi.placeholder = t('message');
            }

            applyCustomTheme(theme, isPreview = false, targetId = 'customThemeStyle') {
                if (!theme || !theme.colors) return;
                const c = theme.colors;
                const v = theme.visuals || {};
                
                const selector = isPreview ? '#themePreviewWin' : '[data-theme="custom"]';
                let css = `
                    ${selector} {
                        --bg-dark: ${c.bg_main || '#000000'};
                        --bg-mid: ${c.bg_sidebar || '#0a0a0a'};
                        --bg-light: ${c.bg_chat_active || '#1a1a1a'};
                        --bg-hover: ${c.bg_chat_active || '#1a1a1a'};
                        --bubble-out: ${c.bubble_out || '#0d2d0d'};
                        --bubble-in: ${c.bubble_in || '#161616'};
                        --border: ${c.bg_sidebar || '#1c1c1c'};
                        --text: ${c.text_primary || '#e0e0e0'};
                        --text-dim: ${c.text_secondary || '#808080'};
                        --accent: ${c.accent || '#00ff41'};
                        --accent-light: ${c.accent || '#00ff41'};
                        --accent-dark: ${c.accent || '#00ff41'};
                        --red: ${c.danger || '#ff4444'};
                        --green: ${c.status_online || '#00ff41'};
                        --sidebar-bg: ${c.bg_sidebar || '#0a0a0a'};
                        --input-bg: ${c.bg_sidebar || '#0a0a0a'};
                        --glass: ${c.bg_sidebar || '#0a0a0a'};
                        --bg-main: ${c.bg_main || '#000000'};
                        --bg-sidebar: ${c.bg_sidebar || '#0a0a0a'};
                        --bg-chat-active: ${c.bg_chat_active || '#1a1a1a'};
                    }
                    ${selector} .msg, ${selector} .preview-bubble {
                        border-radius: ${v.border_radius || '8px'} !important;
                        box-shadow: ${v.message_shadow || 'none'};
                    }
                    ${v.font_family ? `${selector} * { font-family: ${v.font_family} !important; }` : ''}
                `;
                
                if (isPreview) {
                    let styleEl = $(targetId);
                    if (!styleEl) {
                        styleEl = document.createElement('style');
                        styleEl.id = targetId;
                        document.head.appendChild(styleEl);
                    }
                    styleEl.innerHTML = css;
                } else {
                    $('customThemeStyle').innerHTML = css;
                    document.documentElement.setAttribute('data-theme', 'custom');
                }
            }

                    const isCustom = !t.icon;
                    const isActive = settings.theme === (isCustom ? t.theme_id : t.id);
                    const colors = isCustom ? [t.colors.bg_main, t.colors.bg_sidebar, t.colors.bg_chat_active, t.colors.bubble_out] : t.colors;
                    
                    return `
                        <div class="theme-item ${isActive ? 'active' : ''}" onclick="app.selectThemeManager('${isCustom ? t.theme_id : t.id}')">
                            <div class="theme-preview-circle">
                                ${t.icon || `
                                    <div class="theme-preview-colors">
                                        <div style="background:${colors[0]}"></div>
                                        <div style="background:${colors[1]}"></div>
                                        <div style="background:${colors[2]}"></div>
                                        <div style="background:${colors[3]}"></div>
                                    </div>
                                `}
                            </div>
                            <span style="font-size:11px; text-align:center">${t.name}</span>
                        </div>
                    `;
                }).join('');

                this.selectThemeManager(settings.theme);
            }

            selectThemeManager(id) {
                const stdIds = ['dark', 'light', 'amoled'];
                const customs = settings.customThemes || [];
                const theme = customs.find(t => t.theme_id === id);
                
                const items = $('themeManagerList').querySelectorAll('.theme-item');
                items.forEach(item => item.classList.remove('active'));
                
                const idx = stdIds.includes(id) ? stdIds.indexOf(id) : 3 + customs.findIndex(t => t.theme_id === id);
                if (items[idx]) items[idx].classList.add('active');

                if (theme) {
                    $('themeDetails').style.display = 'block';
                    $('detThemeName').textContent = theme.name;
                    $('detThemeAuthor').textContent = theme.author || 'Unknown';
                    this.applyCustomTheme(theme, true, 'previewStyle');
                    
                    $('btnDeleteCustomTheme').onclick = () => this.deleteTheme(theme.theme_id);
                } else {
                    $('themeDetails').style.display = 'none';
                    $('previewStyle')?.remove();
                }

                settings.theme = id;
                Store.set('settings', settings);
                this.updateProfileOnServer(); // Синхронизируем выбор темы с GitHub
                this.applySettings();
            }

            deleteTheme(id) {
                if (!confirm(t('confirm_delete'))) return;
                settings.customThemes = (settings.customThemes || []).filter(t => t.theme_id !== id);
                if (settings.theme === id) settings.theme = 'dark';
                Store.set('settings', settings);
                this.updateProfileOnServer(); // Синхронизируем с GitHub
                this.applySettings();
                this.renderThemeManager();
            }

            async handleThemeImport(file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const theme = JSON.parse(e.target.result);
                        if (theme.theme_id && theme.colors) {
                            if (!settings.customThemes) settings.customThemes = [];
                            const idx = settings.customThemes.findIndex(t => t.theme_id === theme.theme_id);
                            if (idx > -1) settings.customThemes[idx] = theme;
                            else settings.customThemes.push(theme);
                            
                            settings.theme = theme.theme_id;
                            Store.set('settings', settings);
                            await this.updateProfileOnServer(); // Синхронизируем с GitHub
                            this.applySettings();
                            this.renderThemeManager();
                            this.toast(t('settings_saved'), 'success');
                        } else {
                            this.toast(t('format_error'), 'error');
                        }
                    } catch (err) {
                        this.toast(t('format_error'), 'error');
                    }
                };
                reader.readAsText(file);
            }
 
            initEmojiPanel() {
                const list = $('emojiList');
                const tabs = document.querySelectorAll('.emoji-tab');
                if (!list) return;
                
                const renderCat = (cat) => {
                    list.innerHTML = this.emojis[cat].map(e => `<div class="emoji-item">${e}</div>`).join('');
                    list.querySelectorAll('.emoji-item').forEach((el, i) => {
                        el.onclick = () => this.insertEmoji(this.emojis[cat][i]);
                    });
                };

                tabs.forEach(tab => {
                    tab.onclick = () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        renderCat(tab.dataset.cat);
                    };
                });

                renderCat('smileys');
            }

            toggleEmojiPanel() {
                const panel = $('emojiPanel');
                if (panel) {
                    panel.classList.toggle('active');
                    if (panel.classList.contains('active')) {
                        const close = (e) => {
                            if (!panel.contains(e.target) && e.target.id !== 'emojiBtn' && !$('emojiBtn').contains(e.target)) {
                                panel.classList.remove('active');
                                document.removeEventListener('click', close);
                            }
                        };
                        setTimeout(() => document.addEventListener('click', close), 10);
                    }
                }
            }

            insertEmoji(emoji) {
                const mi = $('msgInput');
                if (mi) {
                    const start = mi.selectionStart;
                    const end = mi.selectionEnd;
                    const val = mi.value;
                    mi.value = val.substring(0, start) + emoji + val.substring(end);
                    mi.selectionStart = mi.selectionEnd = start + emoji.length;
                    mi.focus();
                }
            }

             // Инициализация при запуске
            async init() {
                const st = $('configStatus'), er = $('configError');
                console.log('Gitogram init start');

                // Предварительная загрузка данных из кэша для мгновенного старта
                this.username = Store.get('username', '');
                this.userAvatar = Store.get('userAvatar', '');
                this.msgs = Store.get('msgs_cache', []);
                this.profilesCache = Store.get('profiles_cache', {});

                if (!this.username) {
                    $('nameForm').style.display = 'block';
                }

                // 1. Проверка CryptoJS
                if (typeof CryptoJS === 'undefined') {
                    st.innerHTML = '<span class="status-dot err"></span><span>CryptoJS missing</span>';
                    er.style.display = 'block';
                    er.textContent = 'Библиотека CryptoJS не найдена. Попробуйте обновить страницу.';
                    return;
                }

                if (typeof GITOGRAM_CONFIG === 'undefined') {
                    st.innerHTML = '<span class="status-dot err"></span><span>config.js error</span>';
                    return;
                }

                const cfg = GITOGRAM_CONFIG;
                st.innerHTML = `<span class="status-dot wait"></span><span>Подключение...</span> <a href="#" onclick="localStorage.clear();location.reload()" style="font-size:10px;color:var(--accent);margin-left:10px">[Сброс]</a>`;
                
                try {
                    this.gh = new GitHub(cfg.token, cfg.repo, cfg.file || 'messages.json');
                    this.initEmojiPanel();
                    
                    // Тест соединения (макс 4 сек)
                    const testResult = await Promise.race([
                        this.gh.test().catch(() => false),
                        new Promise(r => setTimeout(() => r(false), 4000))
                    ]);

                    if (testResult || (this.gh.token && this.gh.repo)) {
                        st.innerHTML = '<span class="status-dot ok"></span><span>GitHub OK</span>';
                    } else {
                        st.innerHTML = '<span class="status-dot err"></span><span>GitHub Offline</span>';
                        // Если мы не в сети, но имя есть - пробуем войти в оффлайн режиме
                    }

                    if (this.username) {
                        // Пытаемся восстановить/синхронизировать данные при старте
                        try {
                            const res = await this.gh.getFile('profiles.json');
                            const profiles = res ? res.data || {} : {};
                            const p = profiles[this.username];
                            if (p) {
                                if (p.chats && Array.isArray(p.chats)) {
                                    this.chats = p.chats;
                                    Store.set('chats', this.chats);
                                }
                                if (p.settings) {
                                    settings = { ...settings, ...p.settings };
                                    Store.set('settings', settings);
                                    this.applySettings();
                                }
                                if (p.avatar) {
                                    this.userAvatar = p.avatar;
                                    Store.set('userAvatar', p.avatar);
                                }
                            }
                        } catch (e) { console.warn('Silent sync failed at init', e); }
                        this.enterApp();
                    } else {
                        $('nameForm').style.display = 'block';
                    }
                } catch (e) {
                    console.error('Init error:', e);
                    st.innerHTML = '<span class="status-dot err"></span><span>Ошибка входа</span>';
                    $('nameForm').style.display = 'block';
                }
            }

            // Вход в основную часть приложения
            async setUsername() {
                const n = $('inputUsername').value.trim(), p = $('inputPassword').value.trim();
                if (!n || !p) return this.toast(t('enter_name'), 'error');

                const btn = $('btnStartApp');
                const btnReg = $('btnRegister');
                btn.disabled = true;
                btnReg.disabled = true;

                try {
                    const res = await this.gh.getFile('profiles.json');
                    let profiles = res ? res.data || {} : {};
                    const ph = Enc.hash(p);

                    if (profiles[n]) {
                        if (profiles[n].pass !== ph) {
                            btn.disabled = false;
                            btnReg.disabled = false;
                            return this.toast(t('wrong_password'), 'error');
                        }
                        
                        // Восстановление данных с сервера
                        const p = profiles[n];
                        this.userAvatar = p.avatar || '';
                        if (p.chats && Array.isArray(p.chats)) {
                            this.chats = p.chats;
                            Store.set('chats', this.chats);
                        }
                        if (p.settings) {
                            settings = { ...settings, ...p.settings };
                            Store.set('settings', settings);
                            this.applySettings();
                        }
                    } else {
                        btn.disabled = false;
                        btnReg.disabled = false;
                        return this.toast(t('account_not_found'), 'error');
                    }

                    this.username = n;
                    this.userAvatar = profiles[n].avatar || '';
                    Store.set('username', n);
                    Store.set('userAvatar', this.userAvatar);
                    this.enterApp();
                } catch (e) {
                    this.toast(e.message, 'error');
                } finally {
                    btn.disabled = false;
                    btnReg.disabled = false;
                }
            }

            async registerUser() {
                const n = $('inputUsername').value.trim(), p = $('inputPassword').value.trim();
                if (!n || !p) return this.toast(t('enter_name'), 'error');

                const btn = $('btnRegister');
                const btnLogin = $('btnStartApp');
                btn.disabled = true;
                btnLogin.disabled = true;

                try {
                    const res = await this.gh.getFile('profiles.json');
                    let profiles = res ? res.data || {} : {};
                    const ph = Enc.hash(p);

                    if (profiles[n]) {
                        btn.disabled = false;
                        btnLogin.disabled = false;
                        return this.toast(t('account_exists'), 'error');
                    } else {
                        profiles[n] = { pass: ph, avatar: '' };
                        await this.gh.saveFile(profiles, 'profiles.json', res ? res.sha : null);
                    }

                    this.username = n;
                    this.userAvatar = '';
                    Store.set('username', n);
                    Store.set('userAvatar', this.userAvatar);
                    this.enterApp();
                } catch (e) {
                    this.toast(e.message, 'error');
                } finally {
                    btn.disabled = false;
                    btnLogin.disabled = false;
                }
            }

            enterApp() {
                $('welcomeScreen').style.display = 'none';
                $('mainApp').classList.add('active');
                this.updateSidebarUser();
                this.renderChats();
                this.startPoll();
            }

            updateSidebarUser() {
                const el = $('sidebarUser');
                if (this.userAvatar) {
                    el.innerHTML = `<img src="${this.userAvatar}" style="width:20px;height:20px;border-radius:50%;object-fit:cover"> ${esc(this.username)}`;
                } else {
                    el.textContent = '👤 ' + this.username;
                }
            }

            /**
             * Привязка событий (Event Listeners)
             */
            bind() {
                const b = (id, event, fn) => {
                    const el = $(id);
                    if (el) el[event] = fn;
                    return el;
                };

                // Логин
                b('btnStartApp', 'onclick', () => this.setUsername());
                b('btnRegister', 'onclick', () => this.registerUser());
                const iu = $('inputUsername');
                if (iu) iu.onkeydown = e => { if (e.key === 'Enter') this.setUsername() };

                // Боковая панель
                b('btnAddChat', 'onclick', () => {
                    this.openModal('modalAddChat');
                    this.switchAddChatTab('create');
                });
                b('btnSettings', 'onclick', () => this.openSettings());
                b('btnBack', 'onclick', () => $('mainApp')?.classList.remove('chat-open'));
                b('emojiBtn', 'onclick', () => this.toggleEmojiPanel());
                b('themeInput', 'onchange', e => {
                    const file = e.target.files[0];
                    if (file) this.handleThemeImport(file);
                });

                // Переключение табов в модалке добавления чата
                b('tabCreateChat', 'onclick', () => this.switchAddChatTab('create'));
                b('tabImportChat', 'onclick', () => this.switchAddChatTab('import'));

                // Настройки - табы
                const st = $('settingsTabs');
                if (st) {
                    const setTabs = st.querySelectorAll('.settings-tab');
                    const setPanes = document.querySelectorAll('.settings-pane');
                    setTabs.forEach(t => {
                        t.onclick = () => {
                            setTabs.forEach(x => x.classList.remove('active'));
                            setPanes.forEach(x => x.classList.remove('active'));
                            t.classList.add('active');
                            const pane = $('pane_' + t.dataset.tab);
                            if (pane) pane.classList.add('active');
                        }
                    });
                }

                // Чат
                b('btnInviteChat', 'onclick', () => this.inviteChat());
                b('btnShowKey', 'onclick', () => this.showKey());
                b('btnDeleteChat', 'onclick', () => { if (this.curChat && confirm(t('confirm_delete_chat'))) this.deleteChat(this.curChat.id) });

                // Голосовые сообщения
                let mediaRecorder, audioChunks = [];
                const startRecording = async () => {
                    if (!window.isSecureContext) return this.toast(t('notif_secure_required'), 'error');
                    if (!navigator.mediaDevices) return this.toast('API микрофона недоступен', 'error');
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const mimeType = ['audio/mp4', 'audio/aac', 'audio/ogg', 'audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm';
                        mediaRecorder = new MediaRecorder(stream, { mimeType });
                        mediaRecorder.start();
                        audioChunks = [];
                        const vb = $('voiceBtn');
                        if (vb) vb.style.color = 'var(--red)';
                        
                        const ext = mimeType.includes('mp4') ? 'm4a' : (mimeType.includes('ogg') ? 'ogg' : 'webm');
                        
                        mediaRecorder.addEventListener("dataavailable", event => {
                            audioChunks.push(event.data);
                        });
                        
                        mediaRecorder.addEventListener("stop", () => {
                            const audioBlob = new Blob(audioChunks, { type: mimeType });
                            const reader = new FileReader();
                            reader.onload = () => {
                                const b64 = reader.result.split(',')[1];
                                this.sendVoice(b64, ext, mimeType);
                            };
                            reader.readAsDataURL(audioBlob);
                        });
                    } catch(e) {
                        this.toast('Ошибка доступа к микрофону', 'error');
                    }
                };
                
                const stopRecording = () => {
                    if (mediaRecorder && mediaRecorder.state !== "inactive") {
                        mediaRecorder.stop();
                        mediaRecorder.stream.getTracks().forEach(t => t.stop());
                        const vb = $('voiceBtn');
                        if (vb) vb.style.color = 'var(--text-dim)';
                    }
                };
                
                b('voiceBtn', 'onmousedown', startRecording);
                b('voiceBtn', 'onmouseup', stopRecording);
                b('voiceBtn', 'onmouseleave', stopRecording);

                // Ввод сообщений
                const mi = $('msgInput');
                if (mi) {
                    mi.onkeydown = e => {
                        if (e.key === 'Enter' && !e.shiftKey && settings.enterSend) {
                            e.preventDefault();
                            this.send();
                        }
                    };
                    mi.oninput = () => this.autoResize(mi);
                }
                b('sendBtn', 'onclick', () => this.send());

                // Файлы
                b('attachBtn', 'onclick', () => $('fileInput')?.click());
                const fi = $('fileInput');
                if (fi) fi.onchange = e => { if (e.target.files.length) this.attachFiles([...e.target.files]); e.target.value = '' };
                const ai = $('avatarInput');
                if (ai) ai.onchange = e => { if (e.target.files.length) this.uploadAvatar(e.target.files[0]) };
                b('actionClose', 'onclick', () => this.cancelAction());

                // Paste & Drag-n-Drop
                document.addEventListener('paste', e => {
                    if (!this.curChat) return;
                    const files = [];
                    for (const i of (e.clipboardData?.items || [])) if (i.kind === 'file') files.push(i.getAsFile());
                    if (files.length) { e.preventDefault(); this.attachFiles(files) }
                });

                const ca = $('chatArea');
                if (ca) {
                    ca.addEventListener('dragenter', e => {
                        e.preventDefault();
                        this.dragCounter++;
                        if (this.curChat) $('dragOverlay')?.classList.add('active');
                    });
                    ca.addEventListener('dragleave', e => {
                        e.preventDefault();
                        this.dragCounter--;
                        if (this.dragCounter <= 0) { this.dragCounter = 0; $('dragOverlay')?.classList.remove('active') }
                    });
                    ca.addEventListener('dragover', e => e.preventDefault());
                    ca.addEventListener('drop', e => {
                        e.preventDefault();
                        this.dragCounter = 0;
                        $('dragOverlay')?.classList.remove('active');
                        if (this.curChat && e.dataTransfer.files.length) this.attachFiles([...e.dataTransfer.files]);
                    });
                }

                // Модалки
                b('btnGenKey', 'onclick', () => { 
                    const nck = $('newChatKey');
                    if (nck) nck.value = Enc.randomKey();
                });
                b('btnConfirmAdd', 'onclick', () => this.addChat());
                b('btnCopyKey', 'onclick', () => this.copyKey());
                b('btnSaveSettings', 'onclick', () => this.saveSettings());
                b('btnLogout', 'onclick', () => { if (confirm(t('confirm_logout'))) { this.stopPoll(); Store.clear(); location.reload() } });

                // Папки
                b('btnConfirmAddFolder', 'onclick', () => this.addFolder());

                // Делегирование для чатов в списке
                const cl = $('chatsList');
                if (cl) cl.onclick = e => {
                    const item = e.target.closest('.contact-item');
                    if (item && item.dataset.fwd) this.doForward(item.dataset.fwd);
                };

                // Закрытие лайтбокса и меню
                b('lightbox', 'onclick', () => this.closeLightbox());
                b('lightboxClose', 'onclick', (e) => { e.stopPropagation(); this.closeLightbox() });
                document.addEventListener('click', () => {
                    $('ctxMenu')?.classList.remove('active');
                    $('chatCtxMenu')?.classList.remove('active');
                });

                // Контекстное меню чатов
                b('chatCtxMenu', 'onclick', e => {
                    const item = e.target.closest('.ctx-item');
                    if (item) this.chatCtxAction(item.dataset.chataction);
                });

                // Контекстное меню сообщений
                b('ctxMenu', 'onclick', e => {
                    const item = e.target.closest('.ctx-item');
                    if (item) this.ctxAction(item.dataset.action);
                });

                // Модалка пересылки
                b('forwardList', 'onclick', e => {
                    const item = e.target.closest('.contact-item');
                    if (item) this.doForward(item.dataset.fwd);
                });

                // Переименование
                b('btnConfirmRename', 'onclick', () => this.confirmRename());
                const ri = $('renameInput');
                if (ri) ri.onkeydown = e => { if (e.key === 'Enter') this.confirmRename() };

                // Кнопки закрытия модалок
                document.querySelectorAll('[data-close]').forEach(el => {
                    el.onclick = () => this.closeModal(el.dataset.close);
                });

                window.onfocus = () => this.fetchMessages();
            }

            /**
             * Опрос (Polling) новых сообщений
             */
            startPoll() {
                this.stopPoll();
                this._pollLoop();
            }

            async _pollLoop() {
                if (this._isPolling) return;
                this._isPolling = true;
                
                try {
                    await this.fetchMessages();
                } catch (e) {
                    console.error('Poll error', e);
                } finally {
                    this._isPolling = false;
                    // Рекурсивный setTimeout вместо setInterval для предотвращения наложения
                    // Минимальный интервал 500мс для стабильности, даже если просили 100мс
                    const delay = Math.max(settings.pollInterval || 100, 500);
                    this.poll = setTimeout(() => this._pollLoop(), delay);
                }
            }

            stopPoll() {
                if (this.poll) { clearTimeout(this.poll); this.poll = null; }
                this._isPolling = false;
            }

            async fetchMessages() {
                if (!this.gh) return;
                try {
                    const res = await this.gh.getFile();
                    const newMsgs = (res && res.data && res.data.messages) ? res.data.messages : [];
                    this.setConn(true);
                    
                    // Обновляем кэш профилей (аватарки) раз в 30 секунд
                    if (!this._lastProfileUpdate || Date.now() - this._lastProfileUpdate > 30000) {
                        const pRes = await this.gh.getFile('profiles.json');
                        if (pRes && pRes.data) {
                            this.profilesCache = pRes.data;
                            Store.set('profiles_cache', pRes.data);
                        }
                        this._lastProfileUpdate = Date.now();
                    }

                    this.msgs = newMsgs;
                    Store.set('msgs_cache', newMsgs); // Сохраняем в кэш для оффлайн режима

                    if (this.curChat) {
                        Store.set('lastRead_' + this.curChat.id, Date.now());
                        const sig = this.getSig();
                        if (sig !== this.lastSig) {
                            this.lastSig = sig;
                            this.smartUpdate();
                        }
                    }
                    this.renderChats();
                } catch (e) {
                    console.warn('Fetch failed, switching to offline mode:', e);
                    this.setConn(false);
                    
                    // Оффлайн режим: загружаем сообщения из кэша
                    const cachedMsgs = Store.get('msgs_cache');
                    if (cachedMsgs && Array.isArray(cachedMsgs)) {
                        this.msgs = cachedMsgs;
                        if (this.curChat) {
                            const sig = this.getSig();
                            if (sig !== this.lastSig) {
                                this.lastSig = sig;
                                this.smartUpdate();
                            }
                        }
                        this.renderChats();
                    }

                    const cachedProfiles = Store.get('profiles_cache');
                    if (cachedProfiles) this.profilesCache = cachedProfiles;
                }
            }

            getSig() {
                if (!this.curChat) return '';
                return this.msgs.filter(m => m.ch === this.curChat.id).map(m => m.id + m.d.slice(-6)).join(',');
            }

            setConn(ok) {
                $('connDot').className = 'conn-dot-sm ' + (ok ? 'on' : 'off');
                $('connText').textContent = t(ok ? 'connected' : 'error');
            }

            /**
             * Работа с чатами (Add, Delete, Rename)
             */
            switchAddChatTab(tab) {
                const isCreate = tab === 'create';
                $('tabCreateChat').classList.toggle('active', isCreate);
                $('tabImportChat').classList.toggle('active', !isCreate);
                $('paneCreateChat').style.display = isCreate ? 'block' : 'none';
                $('paneImportChat').style.display = isCreate ? 'none' : 'block';
                $('btnConfirmAdd').textContent = isCreate ? t('create') : t('import');
            }

            addChat() {
                const isImport = $('tabImportChat').classList.contains('active');
                let name, key;

                if (isImport) {
                    try {
                        const cfgStr = $('importChatConfig').value.trim();
                        if (!cfgStr) return this.toast(t('import_error'), 'error');
                        const cfg = JSON.parse(cfgStr);
                        if (!cfg.chat || !cfg.chat.name || !cfg.chat.key) throw new Error(t('format_error'));
                        name = cfg.chat.name;
                        key = cfg.chat.key;
                    } catch (e) {
                        return this.toast(e.message, 'error');
                    }
                } else {
                    name = $('newChatName').value.trim();
                    key = $('newChatKey').value.trim();
                    if (!name || !key) return this.toast(t('fill_fields'), 'error');
                }

                this.doImportChat(name, key);
                this.closeModal('modalAddChat');

                $('newChatName').value = '';
                $('newChatKey').value = '';
                $('importChatConfig').value = '';
            }

            deleteChat(id) {
                this.sendSys(id, 'leave');
                this.chats = this.chats.filter(c => c.id !== id);
                this.saveChats();
                if (this.curChat?.id === id) {
                    this.curChat = null;
                    $('activeChat').style.display = 'none';
                    $('noChat').style.display = 'flex';
                    $('mainApp').classList.remove('chat-open');
                }
                this.renderChats();
            }

            saveChats() {
                Store.set('chats', this.chats);
                this.updateProfileOnServer(); // Синхронизируем с GitHub
                this.renderChats();
            }

            selectChat(id) {
                this.curChat = this.chats.find(c => c.id === id);
                if (!this.curChat) return;
                
                // Сбрасываем флаг удаления при переключении
                this.curChat.deletedGlobal = false;
                
                this.renderedIds.clear();
                this.renderedHashes.clear();
                this.clearFiles();
                this.cancelAction();
                this.lastSig = '';
                $('noChat').style.display = 'none';
                $('activeChat').style.display = 'flex';
                $('hdrAvatar').textContent = this.curChat.name[0].toUpperCase();
                $('hdrAvatar').style.background = this.curChat.color;
                $('hdrName').textContent = this.curChat.name;
                $('mainApp').classList.add('chat-open');
                Store.set('lastRead_' + id, Date.now());
                $('msgWrap').innerHTML = '';
                
                const inputArea = $('inputArea');
                inputArea.style.display = 'flex';
                $('msgInput').disabled = false;
                $('msgInput').placeholder = t('message');

                this.renderChats();
                this.fullRender();
                $('msgInput').focus();
            }

            showChatCtx(e, chatId) {
                e.preventDefault();
                e.stopPropagation();
                this.ctxChatId = chatId;
                const chat = this.chats.find(c => c.id === chatId);
                if (!chat) return;

                const menu = $('chatCtxMenu');

                menu.style.left = Math.min(e.clientX, innerWidth - 200) + 'px';
                menu.style.top = Math.min(e.clientY, innerHeight - 160) + 'px';
                $('ctxMenu').classList.remove('active');
                menu.classList.add('active');
            }

            chatCtxAction(action) {
                $('chatCtxMenu').classList.remove('active');
                const chat = this.chats.find(c => c.id === this.ctxChatId);
                if (!chat) return;
                if (action === 'rename') {
                    $('renameInput').value = chat.name;
                    this.openModal('modalRename');
                } else if (action === 'copykey') {
                    navigator.clipboard.writeText(chat.key).then(() => this.toast(t('copied'), 'success'));
                } else if (action === 'move') {
                    this.showAssignFolder();
                } else if (action === 'deletechat') {
                    if (confirm(t('confirm_delete_chat'))) this.deleteChat(chat.id);
                }
            }

            showAssignFolder() {
                const chat = this.chats.find(c => c.id === this.ctxChatId);
                if (!chat) return;
                
                const list = $('assignFolderList');
                const folders = settings.folders || [];
                
                let html = `<div class="ctx-item" onclick="app.assignFolder(null)">
                    <span style="flex:1">${t('no_folder')}</span>
                    ${!chat.folder ? '✅' : ''}
                </div>`;
                
                html += folders.map(f => `
                    <div class="ctx-item" onclick="app.assignFolder('${f.id}')">
                        <span style="flex:1">${esc(f.name)}</span>
                        ${chat.folder === f.id ? '✅' : ''}
                    </div>
                `).join('');
                
                list.innerHTML = html;
                this.openModal('modalAssignFolder');
            }

            assignFolder(folderId) {
                const chat = this.chats.find(c => c.id === this.ctxChatId);
                if (!chat) return;
                
                if (folderId) chat.folder = folderId;
                else delete chat.folder;
                
                this.saveChats();
                this.closeModal('modalAssignFolder');
                this.renderFolders();
                this.renderChats();
                this.toast(t('moved'), 'success');
            }

            confirmRename() {
                const nn = $('renameInput').value.trim();
                if (!nn) return;
                const chat = this.chats.find(c => c.id === this.ctxChatId);
                if (!chat) return;
                chat.name = nn;
                this.saveChats();
                if (this.curChat?.id === chat.id) {
                    $('hdrName').textContent = nn;
                    $('hdrAvatar').textContent = nn[0].toUpperCase();
                }
                this.closeModal('modalRename');
                this.toast(t('renamed'), 'success');
            }

            /**
             * Отрисовка интерфейса (Rendering)
             */
            // Отрисовка папок
            renderFolders() {
                const bar = $('foldersBar');
                if (!bar) return;
                const defaultFolders = [{ id: 'all', name: t('all_folders') }];
                const customFolders = settings.folders || [];
                const folders = [...defaultFolders, ...customFolders];
                
                const html = folders.map(f => {
                    let count = 0;
                    if (f.id === 'all') count = this.chats.length;
                    else count = this.chats.filter(c => c.folder === f.id).length;
                    
                    const active = this.curFolder === f.id;
                    return `<div class="folder-tab${active ? ' active' : ''}" onclick="app.setFolder('${f.id}')" oncontextmenu="app.showFolderCtx(event, '${f.id}')">
                        ${f.name} <span class="folder-badge">${count}</span>
                    </div>`;
                }).join('') + `<div class="add-folder-btn" onclick="app.openModal('modalAddFolder')">+</div>`;

                if (bar.innerHTML !== html) bar.innerHTML = html;
            }

            addFolder() {
                const name = $('newFolderName').value.trim();
                if (!name) return;
                const id = 'f_' + Date.now();
                if (!settings.folders) settings.folders = [];
                settings.folders.push({ id, name });
                Store.set('settings', settings);
                this.updateProfileOnServer(); // Сохраняем в облако
                $('newFolderName').value = '';
                this.closeModal('modalAddFolder');
                this.renderFolders();
            }

            showFolderCtx(e, id) {
                if (id === 'all') return;
                e.preventDefault();
                if (confirm(t('confirm_delete_folder'))) {
                    settings.folders = settings.folders.filter(f => f.id !== id);
                    this.chats.forEach(c => { if (c.folder === id) delete c.folder });
                    if (this.curFolder === id) this.curFolder = 'all';
                    Store.set('settings', settings);
                    this.saveChats();
                    this.renderFolders();
                    this.renderChats();
                }
            }

            setFolder(id) {
                this.curFolder = id;
                this.renderFolders();
                this.renderChats();
            }

            renderChats() {
                this.renderFolders();
                const el = $('chatsList');
                if (!this.chats.length) {
                    el.innerHTML = `<div class="empty-contacts"><div class="empty-icon">💬</div><p>${t('no_chats')}</p><p style="font-size:var(--fs-xs);opacity:.7;margin-top:6px">${t('add_hint')}</p></div>`;
                    return;
                }

                let filtered = this.chats;
                if (this.curFolder !== 'all') {
                    filtered = this.chats.filter(c => c.folder === this.curFolder);
                }

                const html = filtered.map(ch => {
                    const a = this.curChat?.id === ch.id, pv = this.getPreview(ch), u = a ? 0 : this.getUnread(ch);
                    return `<div class="contact-item${a ? ' active' : ''}" onclick="app.selectChat('${ch.id}')" oncontextmenu="app.showChatCtx(event,'${ch.id}')">
                        <div class="contact-avatar" style="background:${ch.color}">${ch.name[0].toUpperCase()}</div>
                        <div class="contact-info">
                            <div class="contact-info-top">
                                <span class="contact-name">${esc(ch.name)}</span>
                                <span class="contact-time">${pv.time}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px">
                                <span class="contact-preview" style="flex:1">${esc(pv.text)}</span>
                                ${u > 0 ? `<span class="contact-badge">${u}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                if (el.innerHTML !== html) el.innerHTML = html;
            }

            getPreview(ch) {
                try {
                    const list = this.msgs.filter(m => m && m.ch === ch.id);
                    if (!list.length) return { text: t('no_messages'), time: '' };
                    for (let i = list.length - 1; i >= 0; i--) {
                        try {
                            const d = Enc.decrypt(list[i].d, ch.key);
                            if (!d) continue;
                            const p = JSON.parse(d);
                            if (p.del) continue;
                            const who = p.s === this.username ? t('you') : p.s;
                            let txt = p.m ? stripMd(p.m.replace(/\n/g, ' ')).slice(0, 50) : '';
                            if (p.voice) txt = '🎤 ' + (settings.lang === 'ru' ? 'Голосовое сообщение' : 'Voice message');
                            else if (p.call) txt = '📞 ' + (p.call === 'start' ? t('incoming_call') : t('call_ended'));
                            else if (p.f?.length) txt = txt ? `${EXT.emoji(p.f[0].n)} ${txt}` : `${EXT.emoji(p.f[0].n)} ${p.f[0].n}`;
                            if (p.fw) txt = '↪️ ' + txt;
                            return { text: who + ': ' + txt, time: fmtTime(list[i].t) };
                        } catch { continue }
                    }
                } catch (e) { console.error('Preview error', e); }
                return { text: '🔒', time: '' };
            }

            getUnread(ch) {
                try {
                    const lr = Store.get('lastRead_' + ch.id, 0);
                    return this.msgs.filter(m => m && m.ch === ch.id && m.t > lr).length;
                } catch { return 0; }
            }

            decode() {
                if (!this.curChat) return [];
                const key = this.curChat.key;
                const list = this.msgs.filter(m => m && m.ch === this.curChat.id).sort((a, b) => a.t - b.t);
                const res = [];
                for (const m of list) {
                    try {
                        const d = Enc.decrypt(m.d, key);
                        if (!d) continue;
                        const p = JSON.parse(d);
                        res.push({
                            id: m.id, sender: p.s, text: p.m || '', files: p.f || [], t: m.t, ch: m.ch,
                            own: p.s === this.username, replyId: p.r || null, fw: p.fw || null,
                            del: !!p.del, edited: !!p.ed, sys: p.sys || null,
                            call: p.call || null, voice: p.voice || null,
                            pending: !!m.pending
                        });
                    } catch (e) { console.warn('Decode error for msg', m.id, e); }
                }
                this.decodedCache = res;
                return res;
            }

            cHash(m) { return (m.del ? 'D' : '') + (m.edited ? 'E' : '') + (m.pending ? 'P' : '') + m.text + (m.files?.length || 0) }

            fullRender() {
                const wrap = $('msgWrap'), decoded = this.decode();
                if (!decoded.length) {
                    wrap.innerHTML = `<div class="empty-messages"><div style="font-size:48px;opacity:.3;margin-bottom:8px">🔐</div><p>${t('no_messages')}</p></div>`;
                    return;
                }
                const locale = settings.lang === 'en' ? 'en-US' : 'ru-RU';
                let html = '', ld = '', ls = '';
                for (let i = 0; i < decoded.length; i++) {
                    const m = decoded[i];
                    html += this.buildMsg(m, decoded, i, ld, ls, false);
                    ld = new Date(m.t).toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' });
                    ls = m.sender;
                    this.renderedIds.add(m.id);
                    this.renderedHashes.set(m.id, this.cHash(m));
                }
                wrap.innerHTML = html;
                requestAnimationFrame(() => wrap.scrollTop = wrap.scrollHeight);
                this.lastSig = this.getSig();
                this.loadMedia();
            }

            smartUpdate() {
                try {
                    const decoded = this.decode();
                    if (!decoded || !decoded.length) return;
                    const wrap = $('msgWrap');
                    if (!wrap) return;
                    const ee = wrap.querySelector('.empty-messages');
                    if (ee) ee.remove();

                    const locale = settings.lang === 'en' ? 'en-US' : 'ru-RU';

                    const changed = decoded.filter(m => this.renderedIds.has(m.id) && this.renderedHashes.get(m.id) !== this.cHash(m));
                    for (const m of changed) {
                        const el = wrap.querySelector(`[data-msgid="${m.id}"]`);
                        if (el) {
                            if (m.del) { el.remove(); this.renderedHashes.set(m.id, this.cHash(m)); continue }
                            const playing = el.querySelector('video[data-loaded],audio[data-loaded]');
                            if (!playing || playing.paused) {
                                const idx = decoded.indexOf(m), prev = idx > 0 ? decoded[idx - 1] : null;
                                const pd = prev ? new Date(prev.t).toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' }) : '';
                                const tmp = document.createElement('div');
                                tmp.innerHTML = this.buildMsg(m, decoded, idx, pd, prev?.sender || '', false);
                                if (tmp.firstElementChild) { el.replaceWith(tmp.firstElementChild); this.loadMedia() }
                            }
                            this.renderedHashes.set(m.id, this.cHash(m));
                        }
                    }

                    const newMsgs = decoded.filter(m => !this.renderedIds.has(m.id) && !m.del);
                    if (newMsgs.length) {
                        const atBot = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 80;
                        const ar = decoded.filter(m => this.renderedIds.has(m.id));
                        let ls = ar.length ? ar[ar.length - 1].sender : '', ld = ar.length ? new Date(ar[ar.length - 1].t).toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' }) : '';
                        let html = '';
                        for (const m of newMsgs) {
                            const idx = decoded.indexOf(m);
                            html += this.buildMsg(m, decoded, idx, ld, ls, true);
                            ld = new Date(m.t).toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' });
                            ls = m.sender;
                            this.renderedIds.add(m.id);
                            this.renderedHashes.set(m.id, this.cHash(m));
                        }
                        this.isInitialLoad = false;
                        wrap.insertAdjacentHTML('beforeend', html);
                        if (atBot) requestAnimationFrame(() => wrap.scrollTop = wrap.scrollHeight);
                        this.loadMedia();
                    }
                } catch (e) {
                    console.error('SmartUpdate error:', e);
                }
            }

            buildMsg(m, all, idx, prevDate, prevSender, anim) {
                if (m.del) return '';
                let html = '';
                const locale = settings.lang === 'en' ? 'en-US' : 'ru-RU';
                const dt = new Date(m.t).toLocaleDateString(locale, { day: 'numeric', month: 'long', year: 'numeric' });

                if (m.sys) {
                    const txt = m.sys === 'join' ? `${esc(m.sender)} ${t('user_joined')}` : `${esc(m.sender)} ${t('user_left')}`;
                    return `<div class="date-sep" data-msgid="${m.id}"${anim ? '' : ' style="animation:none"'}><span>${txt}</span></div>`;
                }

                // Проверка на команду импорта (если всё сообщение — это только инвайт)
                const importMatch = m.text ? m.text.trim().match(/^gitogram:addchat(\{[\s\S]*?\})$/) : null;
                if (importMatch) {
                    try {
                        const jsonStr = importMatch[1];
                        const chatData = JSON.parse(jsonStr);
                        const chatName = (chatData.chat && chatData.chat.name) ? chatData.chat.name : t('new_chat');
                        
                        if (dt !== prevDate) html += `<div class="date-sep"><span>${dt}</span></div>`;
                        
                        const safeStr = btoa(unescape(encodeURIComponent(jsonStr)));
                        const buttonHtml = `
                            <button class="import-chat-btn" onclick="app.handleTextImport('${safeStr}')">
                                <div class="import-icon">📥</div>
                                <div class="import-text">
                                    <div class="import-title">${t('import_chat')}</div>
                                    <div class="import-name">${esc(chatName)}</div>
                                </div>
                            </button>`;
                        
                        html += `<div class="msg ${m.own ? 'out' : 'in'} gap" data-msgid="${m.id}" oncontextmenu="app.showCtx(event,'${m.id}')">${buttonHtml}</div>`;
                        return html;
                    } catch (e) {
                        // Если JSON невалидный, просто отображаем как обычный текст
                    }
                }

                // Обычная отрисовка сообщения
                if (dt !== prevDate) html += `<div class="date-sep"><span>${dt}</span></div>`;
                const nd = idx + 1 < all.length ? all[idx + 1].sender !== m.sender : true;
                const sn = !m.own && (dt === prevDate ? m.sender !== prevSender : true);
                const sc = this.getSenderColor(m.sender);
                const time = new Date(m.t).toLocaleTimeString(locale.split('-')[0], { hour: '2-digit', minute: '2-digit' });

                const p = this.profilesCache[m.sender];
                let avHtml = '';
                if (sn && p && p.avatar) {
                    avHtml = `<img src="${p.avatar}" class="chat-header-avatar" style="width:28px;height:28px;margin-right:8px;float:left">`;
                }

                let content = '';
                if (m.fw) content += `<div class="msg-forward-header">↪️ ${t('forwarded_from')} ${esc(m.fw.s)}</div>`;
                if (m.replyId) {
                    const o = all.find(x => x.id === m.replyId);
                    if (o) content += `<div class="msg-reply-quote"><div class="rq-name">${esc(o.sender)}</div><div class="rq-text">${esc((o.text || '📎').slice(0, 60))}</div></div>`;
                }

                if (m.voice) {
                    content += `
                        <div class="voice-msg">
                            <div class="voice-icon">🎤</div>
                            <div class="voice-player" data-path="${m.voice.p}" data-mime="${m.voice.t}">
                                <div class="voice-play-btn" onclick="app.playVoice(this)">▶️</div>
                                <div class="voice-progress">
                                    <div class="voice-bar"></div>
                                </div>
                            </div>
                        </div>`;
                }

                for (const f of m.files) content += this.renderFile(f);
                if (m.text) content += `<div class="msg-text${m.files.length ? ' msg-caption' : ''}">${linkify(esc(m.text))}</div>`;

                const pendingSvg = `<svg class="icon-pending" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

                html += `<div class="msg ${m.own ? 'out' : 'in'}${nd ? ' gap' : ''}${m.files.length ? ' has-media' : ''}" data-msgid="${m.id}" oncontextmenu="app.showCtx(event,'${m.id}')"${anim ? '' : ' style="animation:none"'}><div class="msg-bubble">${sn ? `<div style="display:flex;align-items:center;margin-bottom:4px">${avHtml}<div class="msg-sender ${sc}">${esc(m.sender)}</div></div>` : ''}${content}<div class="msg-meta">${m.edited ? `<span class="msg-edited">${t('edited')}</span>` : ''}<span class="msg-time">${m.pending ? pendingSvg : time}</span></div></div></div>`;
                return html;
            }

            async playVoice(btn) {
                const player = btn.closest('.voice-player');
                const path = player.dataset.path;
                const mime = player.dataset.mime;
                const bar = player.querySelector('.voice-bar');

                if (btn.dataset.playing) {
                    btn.textContent = '▶️';
                    delete btn.dataset.playing;
                    if (this._curAudio) { this._curAudio.pause(); this._curAudio = null; }
                    return;
                }

                try {
                    btn.textContent = '⏳';
                    const url = await this.getUrl(path);
                    const audio = new Audio(url);
                    this._curAudio = audio;
                    btn.textContent = '⏸';
                    btn.dataset.playing = "1";
                    
                    audio.ontimeupdate = () => {
                        const p = (audio.currentTime / audio.duration) * 100;
                        bar.style.width = p + '%';
                    };
                    audio.onended = () => {
                        btn.textContent = '▶️';
                        delete btn.dataset.playing;
                        bar.style.width = '0%';
                        this._curAudio = null;
                    };
                    audio.play();
                } catch (e) {
                    btn.textContent = '⚠️';
                    this.toast('Ошибка воспроизведения', 'error');
                }
            }

            // Обработка импорта из текста сообщения
            handleTextImport(b64Str) {
                try {
                    const jsonStr = decodeURIComponent(escape(atob(b64Str)));
                    const data = JSON.parse(jsonStr);
                    let name, key;
                    if (data.chat && typeof data.chat === 'object') {
                        name = data.chat.name;
                        key = data.chat.key;
                    } else {
                        name = data.name || data.chat;
                        key = data.key;
                    }
                    if (name && key) {
                        this.doImportChat(name, key);
                    } else {
                        this.toast(t('format_error'), 'error');
                    }
                } catch (e) {
                    this.toast(t('format_error'), 'error');
                }
            }

            renderFile(f) {
                const n = f.n, p = f.p;
                let h = '';
                h += `<div class="msg-file-card" onclick="app.dl('${esc(p)}','${esc(n)}')"><div class="file-icon ${EXT.iconClass(n)}">${EXT.emoji(n)}</div><div class="file-info"><div class="file-name">${esc(n)}</div><div class="file-size">${fmtSize(f.sz)}</div></div><div class="file-dl-icon">⬇</div></div>`;
                return h;
            }

            getSenderColor(n) {
                if (!this.senderColors[n]) this.senderColors[n] = 'sender-' + (this.colorIdx++ % 8);
                return this.senderColors[n];
            }

            /**
             * Загрузка медиа-контента (Lazy Loading)
             */
            async loadMedia() {
                document.querySelectorAll('[data-path]:not([data-loaded])').forEach(el => {
                    el.dataset.loaded = '1';
                    this.loadEl(el, el.dataset.path);
                });
            }

            async loadEl(el, path) {
                try {
                    const url = await this.getUrl(path);
                    if (el.tagName === 'IMG') { el.onload = () => el.classList.remove('loading'); el.src = url }
                    else el.src = url;
                } catch {
                    if (el.tagName === 'IMG') el.classList.remove('loading');
                }
            }

            async getUrl(p) {
                if (this.fileCache.has(p)) return this.fileCache.get(p);
                try {
                    const blob = await this.gh.getBlob(p);
                    // Проверяем, зашифрован ли файл (по флагу в сообщении, но здесь мы просто пробуем дешифровать если это текст)
                    const text = await blob.text();
                    const decrypted = Enc.decrypt(text, this.curChat.key);
                    
                    let finalBlob = blob;
                    if (decrypted) {
                        // Если дешифровка удалась, значит это был зашифрованный base64
                        const b64 = decrypted;
                        const byteChars = atob(b64);
                        const byteNumbers = new Array(byteChars.length);
                        for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
                        finalBlob = new Blob([new Uint8Array(byteNumbers)]);
                    }
                    
                    const u = URL.createObjectURL(finalBlob);
                    this.fileCache.set(p, u);
                    return u;
                } catch (e) {
                    console.error('File decryption failed', e);
                    return '';
                }
            }

            /**
             * Действия с сообщениями
             */
            showCtx(e, id) {
                e.preventDefault();
                const m = this.decodedCache.find(x => x.id === id);
                if (!m || m.del) return;
                this.ctxMsg = m;
                const menu = $('ctxMenu');
                menu.querySelectorAll('[data-action="edit"],[data-action="delete"]').forEach(el => el.style.display = m.own ? '' : 'none');
                menu.style.left = Math.min(e.clientX, innerWidth - 200) + 'px';
                menu.style.top = Math.min(e.clientY, innerHeight - 200) + 'px';
                $('chatCtxMenu').classList.remove('active');
                menu.classList.add('active');
            }

            ctxAction(a) {
                $('ctxMenu').classList.remove('active');
                const m = this.ctxMsg;
                if (!m) return;
                if (a === 'reply') this.setReply(m);
                else if (a === 'edit') this.setEdit(m);
                else if (a === 'forward') this.showForward(m);
                else if (a === 'copy') { navigator.clipboard.writeText(m.text); this.toast(t('copied'), 'success') }
                else if (a === 'delete') this.deleteMsg(m);
            }

            setReply(m) {
                this.cancelAction();
                this.replyTo = m;
                $('actionIcon').textContent = '↩️';
                $('actionTitle').textContent = t('replying_to') + ' ' + m.sender;
                $('actionText').textContent = m.text || '📎';
                $('actionBar').classList.add('active');

                // Если это канал и мы не админ, показываем поле ввода для ответа
                const isAdmin = !this.curChat?.isChannel || (this.curChat.admin && this.curChat.admin === this.username);
                if (!isAdmin) {
                    $('inputArea').style.display = 'flex';
                }

                $('msgInput').focus();
            }

            setEdit(m) {
                this.cancelAction();
                this.editingMsg = m;
                $('actionIcon').textContent = '✏️';
                $('actionTitle').textContent = t('editing');
                $('actionText').textContent = m.text;
                $('actionBar').classList.add('active');
                $('msgInput').value = m.text;
                this.autoResize($('msgInput'));
                $('msgInput').focus();
            }

            cancelAction() {
                this.replyTo = null;
                this.editingMsg = null;
                $('actionBar').classList.remove('active');
                $('msgInput').placeholder = t('message');

                // Если это канал и мы не админ, снова скрываем поле ввода
                const isAdmin = !this.curChat?.isChannel || (this.curChat.admin && this.curChat.admin === this.username);
                if (!isAdmin) {
                    $('inputArea').style.display = 'none';
                }
            }

            async deleteMsg(m) {
                if (!confirm(t('confirm_delete'))) return;
                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await this.gh.getFile();
                        if (!res || !res.data) return;
                        const data = res.data;
                        const idx = data.messages.findIndex(x => x.id === m.id && x.ch === this.curChat.id);
                        if (idx === -1) return;
                        
                        data.messages.splice(idx, 1);
                        await this.gh.saveFile(data, null, res.sha);
                        
                        this.msgs = data.messages;
                        this.lastSig = '';
                        this.fullRender();
                        this.renderChats();
                        return;
                    } catch { await sleep(500) }
                }
            }

            showForward(m) {
                this.ctxMsg = m;
                $('forwardList').innerHTML = this.chats.filter(c => c.id !== this.curChat?.id).map(c => `
                    <div class="contact-item" data-fwd="${c.id}">
                        <div class="contact-avatar" style="background:${c.color}">${c.name[0].toUpperCase()}</div>
                        <div class="contact-info"><span class="contact-name">${esc(c.name)}</span></div>
                    </div>`).join('') || `<p style="text-align:center;color:var(--text-dim);padding:20px">—</p>`;
                this.openModal('modalForward');
            }

            async doForward(chatId) {
                this.closeModal('modalForward');
                const m = this.ctxMsg; if (!m) return;
                const tgt = this.chats.find(c => c.id === chatId); if (!tgt) return;
                const p = { s: this.username, m: m.text, fw: { s: m.sender } };
                if (m.files.length) p.f = m.files;
                const enc = Enc.encrypt(JSON.stringify(p), tgt.key);
                const nm = { id: uid(), ch: tgt.id, d: enc, t: Date.now() };
                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await this.gh.getFile();
                        const data = (res && res.data) ? res.data : { messages: [] };
                        if (!data.messages) data.messages = [];
                        data.messages.push(nm);
                        await this.gh.saveFile(data, null, res ? res.sha : null);
                        this.msgs = data.messages;
                        this.renderChats();
                        this.toast('↪️', 'success');
                        return;
                    } catch { await sleep(500) }
                }
            }

            /**
             * Работа с вложениями (Attachments)
             */
            attachFiles(files) {
                for (const f of files) {
                    if (f.size > this.MAX_FILE) { this.toast(t('file_too_big'), 'error'); continue }
                    const r = new FileReader();
                    r.onload = () => {
                        this.pendingFiles.push({
                            file: f, base64: r.result.split(',')[1], name: f.name,
                            mime: f.type || 'application/octet-stream', size: f.size
                        });
                        this.renderFP();
                    };
                    r.readAsDataURL(f);
                }
            }

            renderFP() {
                const bar = $('filePreviewBar');
                bar.innerHTML = this.pendingFiles.map((f, i) => `
                    <div class="fp-item">
                        <div class="fp-thumb">${EXT.emoji(f.name)}</div>
                        <span class="fp-name">${esc(f.name)}</span>
                        <button class="fp-remove" onclick="app.removeFile(${i})">✕</button>
                    </div>`).join('');
                bar.classList.toggle('active', this.pendingFiles.length > 0);
                $('msgInput').placeholder = this.pendingFiles.length ? t('caption') : t('message');
            }

            removeFile(i) {
                this.pendingFiles.splice(i, 1);
                this.renderFP();
            }

            clearFiles() {
                this.pendingFiles = [];
                $('filePreviewBar').classList.remove('active');
                $('filePreviewBar').innerHTML = '';
                $('msgInput').placeholder = t('message');
            }

            /**
             * Отправка сообщений (Send Logic)
             */
            async send() {
                if (!this.curChat) return;

                const input = $('msgInput'), text = input.value.trim(), hasF = this.pendingFiles.length > 0;
                if (!text && !hasF && !this.editingMsg) return;

                const btn = $('sendBtn');
                btn.disabled = true;
                input.value = '';
                this.autoResize(input);

                // Редактирование существующего сообщения
                if (this.editingMsg) {
                    const m = this.editingMsg; this.cancelAction();
                    const idx = this.msgs.findIndex(x => x.id === m.id && x.ch === this.curChat.id);
                    if (idx === -1) { btn.disabled = false; return }
                    const old = Enc.decrypt(this.msgs[idx].d, this.curChat.key);
                    let p; try { p = JSON.parse(old) } catch { p = { s: this.username } }
                    p.m = text; p.ed = true;
                    this.msgs[idx].d = Enc.encrypt(JSON.stringify(p), this.curChat.key);
                    for (let i = 0; i < 5; i++) {
                        try {
