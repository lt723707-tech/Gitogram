<!DOCTYPE html>
<html lang="ru" data-theme="dark" data-accent="blue" data-font="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitogram</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- Внешние зависимости -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ══════════════════════════════════════════════════════════
           ОСНОВНЫЕ ПЕРЕМЕННЫЕ И ТЕМЫ
           ══════════════════════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px !important;
            height: 6px !important;
        }
        ::-webkit-scrollbar-track {
            background: transparent !important;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.4) !important;
            border-radius: 10px !important;
            border: 1px solid transparent !important;
            background-clip: padding-box !important;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.6) !important;
        }
        
        /* Стили скроллбара для тем */
        [data-theme="amoled"] ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2) !important; }
        [data-theme="custom"] ::-webkit-scrollbar-thumb { background: var(--accent) !important; }
        
        /* Глобальное поведение */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(128, 128, 128, 0.4) transparent;
        }

        /* Тёмная тема (по умолчанию) */
        [data-theme="dark"] {
            --bg-dark: #0e1621;
            --bg-mid: #17212b;
            --bg-light: #242f3d;
            --bg-hover: #2b3a4c;
            --bubble-out: #2b5278;
            --bubble-in: #182533;
            --border: #1a2533;
            --text: #f5f5f5;
            --text-dim: #708499;
            --red: #e53935;
            --green: #43a047;
            --overlay: rgba(0, 0, 0, .55);
            --sidebar-bg: rgba(23, 33, 43, .92);
            --input-bg: rgba(23, 33, 43, .95);
            --glass: rgba(23, 33, 43, .85);
        }

        /* Светлая тема */
        [data-theme="light"] {
            --bg-dark: #e8ecf0;
            --bg-mid: #ffffff;
            --bg-light: #dfe4ea;
            --bg-hover: #d0d7de;
            --bubble-out: #e3f2fd;
            --bubble-in: #ffffff;
            --border: #c8ced6;
            --text: #1a1a1a;
            --text-dim: #6b7b8d;
            --red: #c62828;
            --green: #2e7d32;
            --overlay: rgba(0, 0, 0, .35);
            --sidebar-bg: rgba(255, 255, 255, .92);
            --input-bg: rgba(255, 255, 255, .95);
            --glass: rgba(255, 255, 255, .85);
        }

        /* AMOLED (чисто черный) */
        [data-theme="amoled"] {
            --bg-dark: #000000;
            --bg-mid: #0a0a0a;
            --bg-light: #151515;
            --bg-hover: #1a1a1a;
            --bubble-out: #1a3a5c;
            --bubble-in: #0d1117;
            --border: #1c1c1c;
            --text: #f0f0f0;
            --text-dim: #5a6a7a;
            --red: #e53935;
            --green: #43a047;
            --overlay: rgba(0, 0, 0, .75);
            --sidebar-bg: rgba(10, 10, 10, .95);
            --input-bg: rgba(10, 10, 10, .95);
            --glass: rgba(10, 10, 10, .9);
        }

        /* Акцентные цвета */
        [data-accent="blue"]   { --accent: #5288c1; --accent-light: #71a8e0; --accent-dark: #3a689b; }
        [data-accent="green"]  { --accent: #43a047; --accent-light: #66bb6a; --accent-dark: #2e7d32; }
        [data-accent="purple"] { --accent: #7e57c2; --accent-light: #9575cd; --accent-dark: #5e35b1; }
        [data-accent="red"]    { --accent: #e53935; --accent-light: #ef5350; --accent-dark: #c62828; }
        [data-accent="orange"] { --accent: #fb8c00; --accent-light: #ffa726; --accent-dark: #ef6c00; }
        [data-accent="pink"]   { --accent: #ec407a; --accent-light: #f06292; --accent-dark: #d81b60; }
        [data-accent="teal"]   { --accent: #00897b; --accent-light: #26a69a; --accent-dark: #00695c; }
        [data-accent="amber"]  { --accent: #ffb300; --accent-light: #ffc107; }

        /* Размеры шрифта */
        [data-font="small"]  { --fs: 13px; --fs-sm: 11px; --fs-xs: 10px; }
        [data-font="normal"] { --fs: 14px; --fs-sm: 12px; --fs-xs: 11px; }
        [data-font="large"]  { --fs: 16px; --fs-sm: 14px; --fs-xs: 12px; }

        * {
            font-family: -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            font-size: var(--fs);
        }

        /* ══════════════════════════════════════════════════════════
           ЭКРАН ПРИВЕТСТВИЯ / ЛОГИН
           ══════════════════════════════════════════════════════════ */
        .welcome-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .welcome-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            max-width: 92vw;
            box-shadow: 0 16px 64px rgba(0, 0, 0, .3);
            text-align: center;
            border: 1px solid var(--border);
        }

        .welcome-logo {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .welcome-card h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .welcome-card .subtitle {
            color: var(--text-dim);
            margin-bottom: 24px;
            font-size: var(--fs-sm);
        }

        /* Элементы форм */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--accent-light);
            font-size: var(--fs-xs);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: var(--fs);
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-dim);
            opacity: .5;
        }

        .form-hint {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Кнопки */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 16px;
            font-size: var(--fs);
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 18px;
        }

        .btn-primary:hover {
            background: var(--accent-light);
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* Статус подключения */
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            font-size: var(--fs-sm);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.ok {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        .status-dot.err {
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
        }

        .status-dot.wait {
            background: #ff9800;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: .3; }
        }

        .error-box {
            background: rgba(229, 57, 53, .15);
            border: 1px solid rgba(229, 57, 53, .3);
            color: #ef9a9a;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: var(--fs-sm);
            margin-bottom: 16px;
            text-align: left;
        }

        /* ══════════════════════════════════════════════════════════
           ОСНОВНОЕ ПРИЛОЖЕНИЕ (Layout)
           ══════════════════════════════════════════════════════════ */
        .app {
            display: none;
            height: 100%;
            padding: 8px;
            gap: 8px;
        }

        .app.active {
            display: flex;
        }

        /* ═══ БОКОВАЯ ПАНЕЛЬ (Sidebar) ═══ */
        .sidebar {
            width: 340px;
            min-width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Папки чатов */
        .folders-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .folders-bar::-webkit-scrollbar { display: none; }
        .folder-tab {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .folder-tab:hover { background: rgba(255,255,255,0.05); }
        .folder-tab.active {
            background: var(--accent);
            color: #fff;
        }
        .folder-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            padding: 0 4px;
        }
        .add-folder-btn {
            width: 28px;
            height: 28px;
            min-width: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            margin-left: 4px;
        }

        .sidebar-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
        }

        .sidebar-header h2 {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-user {
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Список контактов/чатов */
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            overflow-y: overlay;
            padding: 4px 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            transition: all .15s;
            border-radius: 14px;
            margin-bottom: 2px;
        }

        .contact-item:hover {
            background: var(--bg-hover);
        }

        .contact-item.active {
            background: rgba(128, 128, 128, 0.15);
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            margin-right: 12px;
            text-transform: uppercase;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-info-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .contact-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .contact-item.active .contact-time {
            color: var(--text-dim);
        }

        .contact-preview {
            font-size: var(--fs-sm);
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-item.active .contact-preview {
            color: var(--text-dim);
        }

        .contact-badge {
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 7px;
            font-size: var(--fs-xs);
            font-weight: 600;
            flex-shrink: 0;
        }

        .contact-item.active .contact-badge {
            background: #fff;
            color: var(--accent);
        }

        .empty-contacts {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            padding: 24px;
            text-align: center;
        }

        .empty-contacts .empty-icon {
            font-size: 56px;
            margin-bottom: 14px;
            opacity: .3;
        }

        .sidebar-footer {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .conn-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .conn-dot-sm {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .conn-dot-sm.on {
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
        }

        .conn-dot-sm.off {
            background: var(--red);
        }

        /* ═══ ОБЛАСТЬ ЧАТА (Chat Area) ═══ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-dark);
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-bg {
            position: absolute;
            inset: 0;
            opacity: .07; /* Уменьшено для более тонкого эффекта */
            pointer-events: none;
            z-index: 1; /* Поднят выше, чтобы быть над фоновым цветом */
            background-repeat: repeat;
        }

        .chat-bg.pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z' fill='white' fill-opacity='.5'/%3E%3C/svg%3E");
        }

        .chat-bg.circles {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='3' fill='white' fill-opacity='.3'/%3E%3C/svg%3E");
        }

        .chat-bg.waves {
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='40' viewBox='0 0 80 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20c10-10 30-10 40 0s30 10 40 0' stroke='white' stroke-opacity='.3' stroke-width='2' fill='none'/%3E%3C/svg%3E");
        }

        .chat-bg.stars {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1.5' fill='white' fill-opacity='.4'/%3E%3Ccircle cx='50' cy='40' r='2' fill='white' fill-opacity='.3'/%3E%3Ccircle cx='90' cy='80' r='1.5' fill='white' fill-opacity='.4'/%3E%3C/svg%3E");
        }

        .chat-bg.circuit {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30 L60 0 M30 30 L0 60' stroke='white' stroke-opacity='.3' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='30' cy='30' r='3' fill='white' fill-opacity='.4'/%3E%3C/svg%3E");
        }

        .chat-bg.hearts {
            background-image: url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 35 l-10-10 a7 7 0 0 1 10-10 a7 7 0 0 1 10 10 z' fill='white' fill-opacity='.25'/%3E%3C/svg%3E");
        }

        .chat-bg.leaves {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 Q40 30 30 50 Q20 30 30 10 Z M30 20 L30 45 M25 25 L35 35 M35 25 L25 35' stroke='white' stroke-opacity='.3' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
        }

        .chat-bg.mountains {
             background-image: url("data:image/svg+xml,%3Csvg width='100' height='50' viewBox='0 0 100 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 L25 10 L50 50 M40 50 L65 20 L90 50' stroke='white' stroke-opacity='.3' stroke-width='2' fill='none'/%3E%3C/svg%3E");
         }
 
         .chat-bg.bubbles {
             background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='10' stroke='white' stroke-opacity='.3' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='50' cy='50' r='15' stroke='white' stroke-opacity='.2' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='10' cy='60' r='5' stroke='white' stroke-opacity='.3' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
         }

        /* Адаптация паттернов под светлую тему */
        [data-theme="light"] .chat-bg { opacity: .1; }
        [data-theme="light"] .chat-bg.pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z' fill='black' fill-opacity='.2'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.circles { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='3' fill='black' fill-opacity='.1'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.waves { background-image: url("data:image/svg+xml,%3Csvg width='80' height='40' viewBox='0 0 80 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20c10-10 30-10 40 0s30 10 40 0' stroke='black' stroke-opacity='.1' stroke-width='2' fill='none'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.stars { background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1.5' fill='black' fill-opacity='.15'/%3E%3Ccircle cx='50' cy='40' r='2' fill='black' fill-opacity='.1'/%3E%3Ccircle cx='90' cy='80' r='1.5' fill='black' fill-opacity='.15'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.circuit { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30 L60 0 M30 30 L0 60' stroke='black' stroke-opacity='.15' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='30' cy='30' r='3' fill='black' fill-opacity='.1'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.hearts { background-image: url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 35 l-10-10 a7 7 0 0 1 10-10 a7 7 0 0 1 10 10 z' fill='black' fill-opacity='.1'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.leaves { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 Q40 30 30 50 Q20 30 30 10 Z M30 20 L30 45 M25 25 L35 35 M35 25 L25 35' stroke='black' stroke-opacity='.1' stroke-width='1.5' fill='none'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.mountains { background-image: url("data:image/svg+xml,%3Csvg width='100' height='50' viewBox='0 0 100 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 L25 10 L50 50 M40 50 L65 20 L90 50' stroke='black' stroke-opacity='.08' stroke-width='2' fill='none'/%3E%3C/svg%3E"); }
        [data-theme="light"] .chat-bg.bubbles { background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='10' stroke='black' stroke-opacity='.1' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='50' cy='50' r='15' stroke='black' stroke-opacity='.05' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='10' cy='60' r='5' stroke='black' stroke-opacity='.1' stroke-width='1.5' fill='none'/%3E%3C/svg%3E"); }

        .chat-bg.none {
            display: none;
        }

        .chat-header {
            padding: 10px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
            z-index: 2;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-header-sub {
            font-size: var(--fs-xs);
            color: var(--text-dim);
        }

        .chat-header-actions {
            display: flex;
            gap: 2px;
        }

        /* ══════════════════════════════════════════════════════════
           СООБЩЕНИЯ (Messages)
           ══════════════════════════════════════════════════════════ */
        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-y: overlay;
            padding: 16px 20px 80px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .msg {
            max-width: 62%;
            margin-bottom: 3px;
            animation: msgSlide .25s ease-out;
        }

        .msg.gap { margin-bottom: 10px; }
        .msg.has-media { max-width: 380px; }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.out { align-self: flex-end; }
        .msg.in { align-self: flex-start; }

        .msg-bubble {
            padding: 8px 12px 6px;
            border-radius: 18px;
            font-size: var(--fs);
            line-height: 1.45;
            overflow: hidden;
        }

        .msg.out .msg-bubble {
            background: var(--bubble-out);
            border-bottom-right-radius: 6px;
        }

        .msg.in .msg-bubble {
            background: var(--bubble-in);
            border-bottom-left-radius: 6px;
        }

        .msg-sender {
            font-size: var(--fs-xs);
            font-weight: 700;
            margin-bottom: 1px;
        }

        .msg-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .voice-msg { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; min-width: 180px; margin: 4px 0; }
        .voice-icon { font-size: 20px; opacity: 0.8; }
        .voice-player { display: flex; align-items: center; gap: 8px; flex: 1; }
        .voice-play-btn { cursor: pointer; font-size: 16px; user-select: none; }
        .voice-progress { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .voice-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s linear; }

        .msg-text a {
            color: var(--accent-light);
            text-decoration: underline;
            text-underline-offset: 2px;
            font-weight: 500;
            transition: opacity .2s;
        }

        .msg-text a:hover {
            opacity: .8;
        }

        [data-theme="dark"] .msg-text a,
        [data-theme="amoled"] .msg-text a {
            color: #4fc3f7; /* Более светлый голубой для лучшей видимости */
        }

        .msg-text code {
            background: rgba(255, 255, 255, .1);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            color: var(--accent-light);
        }

        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .msg-time {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            opacity: .6;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Анимированная иконка часов */
        .icon-pending {
            width: 11px;
            height: 11px;
            animation: rotate-clock 2s linear infinite;
        }

        @keyframes rotate-clock {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .msg-edited {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            opacity: .5;
            font-style: italic;
        }

        /* Разделитель дат */
        .date-sep {
            text-align: center;
            margin: 14px 0;
            align-self: center;
        }

        .date-sep span {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 5px 16px;
            border-radius: 14px;
            font-size: var(--fs-xs);
            color: var(--text-dim);
            font-weight: 500;
        }

        .empty-messages {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            flex-direction: column;
            text-align: center;
            gap: 8px;
        }

        /* Цитаты и пересылки */
        .msg-reply-quote {
            background: rgba(255, 255, 255, .07);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 5px 10px;
            margin-bottom: 4px;
            font-size: var(--fs-sm);
        }

        .msg-reply-quote .rq-name {
            font-weight: 700;
            color: var(--accent-light);
            font-size: var(--fs-xs);
        }

        .msg-reply-quote .rq-text {
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .msg-forward-header {
            font-size: var(--fs-xs);
            color: var(--accent-light);
            font-style: italic;
            margin-bottom: 2px;
        }

        /* Медиа-контент */
        .msg-media {
            margin: 4px -4px;
            border-radius: 12px;
            overflow: hidden;
        }

        .msg-media img {
            display: block;
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity .3s;
            background: var(--bg-light);
        }

        .msg-media img.loading {
            opacity: .3;
            min-height: 100px;
        }

        .msg-media:hover img {
            opacity: .85;
        }

        .msg-media video {
            display: block;
            width: 100%;
            max-height: 360px;
            border-radius: 12px;
            background: #000;
        }

        .msg-media audio {
            width: 100%;
            max-width: 300px;
            height: 40px;
            margin: 4px 0;
        }

        /* Карточка файла */
        .msg-file-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, .12);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            cursor: pointer;
            transition: background .15s;
            color: inherit;
        }

        .msg-file-card:hover {
            background: rgba(0, 0, 0, .25);
        }

        .file-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .file-icon.ic-img { background: #e91e63; }
        .file-icon.ic-vid { background: #9c27b0; }
        .file-icon.ic-aud { background: #ff9800; }
        .file-icon.ic-def { background: var(--accent); }

        .file-info {
            min-width: 0;
            flex: 1;
        }

        .file-name {
            font-size: var(--fs-sm);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: var(--fs-xs);
            color: var(--text-dim);
            margin-top: 1px;
        }

        .file-dl-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff;
            font-size: 14px;
        }

        /* Большая кнопка импорта (если сообщение состоит только из инвайта) */
        .import-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, .12);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            cursor: pointer;
            transition: background .15s;
            color: inherit;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            min-width: 200px;
        }
        .import-chat-btn:hover { background: rgba(0, 0, 0, .25); }

        .import-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--accent);
            color: #fff;
            flex-shrink: 0;
        }

        .import-text { min-width: 0; flex: 1; }
        .import-title {
            font-size: var(--fs-sm);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .import-name {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Инлайн кнопка (внутри текста) */
        .inline-import-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            font-family: inherit;
            vertical-align: middle;
            margin: 0 4px;
            line-height: 1.2;
            text-decoration: none;
        }
        .inline-import-btn:hover { opacity: 0.85; }
        .inline-import-btn:active { transform: scale(0.96); }

        .msg-caption {
            margin-top: 4px;
        }

        /* ══════════════════════════════════════════════════════════
           ПАНЕЛИ ДЕЙСТВИЙ И ПРЕВЬЮ
           ══════════════════════════════════════════════════════════ */
        /* Панель ответа/редактирования */
        .action-bar {
            display: none;
            padding: 8px 20px;
            z-index: 3;
            align-items: center;
            gap: 10px;
            position: absolute;
            bottom: 72px;
            left: 12px;
            right: 12px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .action-bar.active { display: flex; }

        .action-bar-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .action-bar-content {
            flex: 1;
            min-width: 0;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .action-bar-title {
            font-size: var(--fs-xs);
            font-weight: 700;
            color: var(--accent-light);
        }

        .action-bar-text {
            font-size: var(--fs-sm);
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-bar-close {
            width: 28px;
            height: 28px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .action-bar-close:hover { color: var(--text); }

        /* Превью прикрепленных файлов */
        .file-preview-bar {
            display: none;
            position: absolute;
            bottom: 72px;
            left: 12px;
            right: 12px;
            padding: 8px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--border);
            z-index: 3;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .file-preview-bar.active { display: flex; }

        .fp-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 6px 10px;
            flex-shrink: 0;
        }

        .fp-thumb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-light);
        }

        .fp-name {
            font-size: var(--fs-xs);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .fp-remove {
            width: 20px;
            height: 20px;
            border: none;
            background: var(--red);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ══════════════════════════════════════════════════════════
           ПОЛЕ ВВОДА (Input Bar)
           ══════════════════════════════════════════════════════════ */
        .input-area {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-bar {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: var(--input-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 4px;
            gap: 4px;
            transition: border-color .2s;
            position: relative;
        }

        .input-bar:focus-within {
            border-color: var(--accent);
        }

        .attach-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: 0 0;
            color: var(--text-dim);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
            flex-shrink: 0;
        }

        .attach-btn:hover { color: var(--text); }
        .attach-btn svg { width: 22px; height: 22px; }

        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 74px 8px 4px;
            color: var(--text);
            font-size: var(--fs);
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 36px;
            line-height: 1.4;
            font-family: inherit;
        }

        .msg-input::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            position: absolute;
            right: 6px;
            bottom: 6px;
        }

        .send-btn svg { width: 18px; height: 18px; }

        .send-btn:hover {
            background: var(--accent-light);
            transform: scale(1.08);
        }

        .send-btn:active {
            transform: scale(.95);
        }
        .send-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg { width: 20px; height: 20px; }

        /* ══════════════════════════════════════════════════════════
           КОНТЕКСТНЫЕ МЕНЮ (Context Menus)
           ══════════════════════════════════════════════════════════ */
        .ctx-menu {
            display: none;
            position: fixed;
            z-index: 200;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 0;
            min-width: 190px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
            animation: ctxPop .15s ease-out;
        }

        .ctx-menu.active { display: block; }

        @keyframes ctxPop {
            from { opacity: 0; transform: scale(.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .ctx-item {
            padding: 10px 16px;
            font-size: var(--fs-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background .1s;
            border-radius: 0;
        }

        .ctx-item:first-child { border-radius: 10px 10px 0 0; }
        .ctx-item:last-child { border-radius: 0 0 10px 10px; }
        .ctx-item:hover { background: var(--bg-hover); }
        .ctx-item.danger { color: var(--red); }

        .ctx-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ══════════════════════════════════════════════════════════
           ОВЕРЛЕИ (Overlays)
           ══════════════════════════════════════════════════════════ */
        /* Перетаскивание файлов */
        .drag-overlay {
            display: none;
            position: absolute;
            inset: 8px;
            z-index: 50;
            background: rgba(14, 22, 33, .92);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 3px dashed var(--accent);
            border-radius: 20px;
        }

        .drag-overlay.active { display: flex; }

        .drag-overlay .drag-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: .7;
        }

        .drag-overlay p {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-light);
        }

        /* Оверлей загрузки */
        .upload-overlay {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 55;
            background: rgba(14, 22, 33, .95);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
        }

        .upload-overlay.active { display: flex; }

        .upload-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--bg-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .upload-overlay p { font-size: 15px; color: var(--text-dim); }
        .upload-name {
            font-size: var(--fs-sm);
            color: var(--accent-light);
            margin-top: 6px;
        }

        /* ══════════════════════════════════════════════════════════
           ЛАЙТБОКС (Lightbox)
           ══════════════════════════════════════════════════════════ */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, .92);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        .lightbox.active { display: flex; }

        .lightbox img, .lightbox video {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 12px;
            cursor: default;
        }

        .lb-btn {
            position: fixed;
            top: 16px;
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(10px);
            color: #fff;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-btn:hover { background: rgba(255, 255, 255, .25); }
        #lightboxClose { right: 16px; }
        #lightboxDl {
            right: 70px;
            font-size: 18px;
            text-decoration: none;
            color: #fff;
        }

        /* ══════════════════════════════════════════════════════════
           ЗАГЛУШКИ И МОДАЛЬНЫЕ ОКНА
           ══════════════════════════════════════════════════════════ */
        .no-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            z-index: 1;
        }

        .no-chat .big-icon {
            font-size: 80px;
            opacity: .12;
            margin-bottom: 20px;
        }

        .no-chat h3 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* Общие стили модалок */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            transition: all 0.1s;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 28px;
            width: 460px;
            max-width: 92vw;
            max-height: 90vh;
            overflow-y: auto;
            overflow-y: overlay;
            box-shadow: 0 16px 64px rgba(0, 0, 0, .4);
            animation: modalPop .2s ease-out;
            border: 1px solid var(--border);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(.92) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .gen-key-btn {
            font-size: var(--fs-xs);
            color: var(--accent-light);
            background: 0 0;
            border: none;
            cursor: pointer;
            padding: 4px 0;
        }

        .gen-key-btn:hover { text-decoration: underline; }

        .key-box {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: var(--fs-xs);
            background: var(--bg-dark);
            padding: 8px 12px;
            border-radius: 12px;
            color: var(--accent-light);
            word-break: break-all;
            margin-top: 4px;
            border: 1px solid var(--border);
            user-select: all;
        }

        /* ══════════════════════════════════════════════════════════
           НАСТРОЙКИ (Settings Sections)
           ══════════════════════════════════════════════════════════ */
        .settings-tabs { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .settings-tab { padding: 6px 12px; cursor: pointer; border-radius: 8px; opacity: 0.6; transition: all 0.2s; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .settings-tab.active { background: var(--accent); opacity: 1; color: #fff; }
        .settings-pane { display: none; max-height: 55vh; overflow-y: auto; padding-right: 5px; }
        .settings-pane.active { display: block; }
        .settings-pane::-webkit-scrollbar { width: 4px; }
        .settings-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .settings-section { margin-bottom: 24px; }

        .settings-section h4 {
            font-size: var(--fs-sm);
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-row:last-child { border-bottom: none; }

        /* Выбор цвета и темы */
        .color-picker { display: flex; gap: 6px; flex-wrap: wrap; }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all .15s;
        }

        .color-dot:hover { transform: scale(1.15); }
        .color-dot.active { border-color: var(--text); transform: scale(1.1); }

        .theme-picker { display: flex; gap: 8px; }

        .theme-opt {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--border);
            font-size: var(--fs-sm);
            font-weight: 600;
            transition: all .15s;
            user-select: none;
        }

        .theme-opt:hover { border-color: var(--accent); }
        .theme-opt.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .bg-picker { display: flex; gap: 8px; flex-wrap: wrap; }

        .bg-opt {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-dark);
        }

        .bg-opt:hover { transform: scale(1.1); }
        .bg-opt.active { border-color: var(--accent); }

        /* Переключатель (Toggle) */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--bg-dark);
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .toggle.on {
            background: var(--accent);
            border-color: var(--accent);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            transition: left .2s;
        }

        .toggle.on::after { left: 22px; }

        /* Цвета имен отправителей */
        .sender-0 { color: #ff7043; }
        .sender-1 { color: #ab47bc; }
        .sender-2 { color: #5c6bc0; }
        .sender-3 { color: #29b6f6; }
        .sender-4 { color: #26a69a; }
        .sender-5 { color: #9ccc65; }
        .sender-6 { color: #ffa726; }
        .sender-7 { color: #ec407a; }

        /* Уведомления (Toast) */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 16px;
            font-size: var(--fs);
            z-index: 400;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
            transition: transform .3s ease;
            pointer-events: none;
            border: 1px solid var(--border);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--red); color: #fff; border-color: var(--red); }
        .toast.success { background: var(--green); color: #fff; border-color: var(--green); }

        .toast-notify {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--glass);
            backdrop-filter: blur(24px);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .4);
            transition: transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90vw;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }
        .toast-notify .avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .toast-notify .content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toast-notify .name { font-weight: 600; margin-right: 6px; }

        /* Emoji Panel */
        .emoji-panel {
            position: absolute;
            bottom: 70px;
            left: 15px;
            width: 320px;
            height: 400px;
            background: var(--bg-mid);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .emoji-panel.active { display: flex; }
        .emoji-tabs {
            display: flex;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
            background: var(--bg-dark);
        }
        .emoji-tabs::-webkit-scrollbar { display: none; }
        .emoji-tab {
            min-width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 20px;
            transition: background 0.2s;
        }
        .emoji-tab:hover { background: var(--bg-hover); }
        .emoji-tab.active { background: var(--accent); color: #fff; }
        .emoji-list {
            flex: 1;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            overflow-y: auto;
            overflow-y: overlay;
        }
        .emoji-item {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            cursor: pointer;
            font-size: 24px;
            border-radius: 8px;
            transition: transform 0.1s;
        }
        .emoji-item:hover { background: var(--bg-hover); transform: scale(1.2); }

        /* Theme Manager */
        .theme-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .theme-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }
        .theme-item:hover { background: var(--bg-hover); }
        .theme-item.active { border-color: var(--accent); background: var(--bg-light); }
        .theme-preview-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            position: relative;
        }
        .theme-preview-colors {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
        }
        .theme-preview-colors div { flex: 1; min-width: 50%; height: 50%; }

        .theme-info-box {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            margin-top: 15px;
            font-size: 13px;
        }
        .theme-info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .theme-info-row span:first-child { color: var(--text-dim); }

        .theme-preview-window {
            width: 100%;
            height: 200px; /* Увеличено для лучшего вида */
            background: var(--bg-main, #000);
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .preview-header { 
            height: 30px; 
            background: var(--glass); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            padding: 0 10px;
            gap: 8px;
            font-size: 9px;
            font-weight: 600;
        }
        .preview-body { flex: 1; display: flex; overflow: hidden; }
        .preview-sidebar { 
            width: 35%; 
            height: 100%; 
            background: var(--bg-sidebar, #111); 
            border-right: 1px solid var(--border); 
            padding: 5px; 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .preview-folders { display: flex; gap: 4px; margin-bottom: 5px; }
        .preview-folder { height: 12px; width: 20px; background: var(--bg-light); border-radius: 6px; }
        .preview-folder.active { background: var(--accent); }
        .preview-contact { height: 24px; display: flex; align-items: center; gap: 6px; padding: 4px; border-radius: 6px; }
        .preview-contact.active { background: var(--bg-chat-active); }
        .preview-avatar { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); }
        .preview-contact-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .preview-line { height: 4px; background: var(--text-dim); border-radius: 2px; width: 60%; }
        .preview-line.short { width: 30%; }

        .preview-chat { 
            flex: 1; 
            height: 100%; 
            background: var(--bg-main, #000); 
            position: relative; 
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .preview-bubble { 
            padding: 6px 10px; 
            border-radius: 10px; 
            font-size: 9px; 
            max-width: 85%;
            line-height: 1.2;
        }
        .preview-bubble.in { background: var(--bubble-in, #222); align-self: flex-start; border-bottom-left-radius: 2px; }
        .preview-bubble.out { background: var(--bubble-out, #0d2d0d); align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .preview-input { height: 24px; background: var(--bg-sidebar); border-top: 1px solid var(--border); margin-top: auto; border-radius: 0 0 0 0; padding: 5px; display: flex; align-items: center; gap: 5px; }
        .preview-input-line { height: 10px; background: var(--bg-light); border-radius: 5px; flex: 1; }
        .preview-send { width: 14px; height: 14px; background: var(--accent); border-radius: 50%; }

        .sub-pane { display: none; }
        .sub-pane.active { display: block; }

        /* Адаптивность */
        @media(max-width:768px) {
            .app.active { 
                padding: 0; 
                gap: 0; 
                position: relative; 
                overflow: hidden;
                display: block;
            }
            .sidebar { 
                position: absolute;
                top: 0;
                left: 0;
                width: 100%; 
                height: 100%;
                min-width: 100%; 
                border-radius: 0; 
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 10;
                background: var(--bg-dark); /* Обеспечиваем непрозрачный фон */
            }
            .app.chat-open .sidebar { 
                transform: translateX(-100%);
            }
            .chat-area { 
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border-radius: 0; 
                transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 20;
                background: var(--bg-dark);
                display: flex !important; /* Всегда flex, управляем через transform */
            }
            .app.chat-open .chat-area { 
                transform: translateX(0);
            }
            .back-btn { display: flex !important; }
            .msg { max-width: 85%; }
            .msg.has-media { max-width: 80vw; }
            .input-area { bottom: 6px; left: 6px; right: 6px; }

            /* Плавное появление элементов внутри чата */
            .chat-header, .messages-wrap, .input-area {
                opacity: 0;
                transition: opacity 0.2s 0.1s;
            }
            .app.chat-open .chat-header, 
            .app.chat-open .messages-wrap, 
            .app.chat-open .input-area {
                opacity: 1;
            }
        }

        .back-btn { display: none; }
    </style>
    <style id="customThemeStyle"></style>
</head>
<body>

    <!-- Экран приветствия -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-card">
            <div class="welcome-logo">🔐</div>
            <h1>Gitogram</h1>
            <p class="subtitle" data-t="subtitle"></p>

            <div id="configStatus" class="status-line">
                <span class="status-dot wait"></span>
                <span data-t="checking"></span>
            </div>

            <div id="configError" class="error-box" style="display:none"></div>

            <div id="nameForm" style="display:none">
                <div class="form-group">
                    <label data-t="your_name"></label>
                    <input type="text" id="inputUsername" data-tp="enter_name">
                </div>
                <div class="form-group">
                    <label data-t="password"></label>
                    <input type="password" id="inputPassword" data-tp="enter_password">
                </div>
                <button class="btn btn-primary" id="btnStartApp" data-t="login"></button>
                <button class="btn btn-secondary" id="btnRegister" style="margin-top:10px; width:100%" data-t="register"></button>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="mainApp" class="app">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div>
                    <h2><span style="font-size:20px">🔐</span> Gitogram</h2>
                    <div class="sidebar-user" id="sidebarUser"></div>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="btnAddChat" title="Новый чат">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="btnSettings" title="Настройки">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="folders-bar" id="foldersBar"></div>
            <div class="contacts-list" id="chatsList"></div>
            <div class="sidebar-footer">
                <div class="conn-info">
                    <span class="conn-dot-sm on" id="connDot"></span>
                    <span id="connText"></span>
                </div>
            </div>
        </div>

        <!-- Область чата -->
        <div class="chat-area" id="chatArea">
            <div class="chat-bg pattern" id="chatBg"></div>

            <!-- Заглушка, когда чат не выбран -->
            <div class="no-chat" id="noChat">
                <div class="big-icon">💬</div>
                <h3 data-t="select_chat"></h3>
                <p data-t="each_chat_key"></p>
            </div>

            <!-- Активный чат -->
            <div id="activeChat" style="display:none;flex-direction:column;height:100%;position:relative;z-index:1">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <button class="icon-btn back-btn" id="btnBack">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                        </button>
                        <div class="chat-header-avatar" id="hdrAvatar"></div>
                        <div>
                            <div class="chat-header-name" id="hdrName"></div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="icon-btn" id="btnInviteChat" title="Пригласить в чат">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="8.5" cy="7" r="4" />
                                <line x1="20" y1="8" x2="20" y2="14" />
                                <line x1="23" y1="11" x2="17" y2="11" />
                            </svg>
                        </button>
                        <button class="icon-btn" id="btnShowKey" title="Показать ключ">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </button>
                        <button class="icon-btn" id="btnDeleteChat" title="Удалить чат">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <polyline points="3 6 5 6 21 6" />
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Список сообщений -->
                <div class="messages-wrap" id="msgWrap"></div>

                <!-- Оверлеи для файлов -->
                <div class="drag-overlay" id="dragOverlay">
                    <div class="drag-icon">📎</div>
                    <p data-t="drop_files"></p>
                </div>
                <div class="upload-overlay" id="uploadOverlay">
                    <div class="upload-spinner"></div>
                    <p data-t="uploading"></p>
                    <div class="upload-name" id="uploadName"></div>
                </div>

                <!-- Панель ответа/действий -->
                <div class="action-bar" id="actionBar">
                    <div class="action-bar-icon" id="actionIcon">↩️</div>
                    <div class="action-bar-content">

        // Вспомогательные функции (Shortcuts)
        const $ = id => document.getElementById(id);
        const esc = s => {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        };

        const linkify = t => {
            // 1. Инлайн код: `текст`
            let res = t.replace(/`(.*?)`/g, '<code>$1</code>');
            
            // 2. Жирный, курсив, подчеркнутый (Markdown)
            res = res
                .replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/__(.*?)__/g, '<u>$1</u>');

            const links = [];

            // 3. Инлайн-импорт чата
            res = res.replace(/\[([^\]]+)\]\(gitogram:addchat(\{(?:[^{}]|(?:\{[^{}]*\}))*\})\)/g, (m, txt, json) => {
                try {
                    const cleanJson = JSON.parse(json);
                    const safeStr = btoa(unescape(encodeURIComponent(JSON.stringify(cleanJson))));
                    links.push(`<button class="inline-import-btn" onclick="app.handleTextImport('${safeStr}')">${txt}</button>`);
                    return `__LINK_${links.length - 1}__`;
                } catch (e) { return m; }
            });

            // 4. Текстовые ссылки [текст](url)
            res = res.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, (m, txt, url) => {
                links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">${txt}</a>`);
                return `__LINK_${links.length - 1}__`;
            });

            // 5. Автоматические URL
            const urlRe = /(https?:\/\/[^\s<]+)/g;
            res = res.replace(urlRe, m => {
                links.push(`<a href="${m}" target="_blank" rel="noopener noreferrer">${m}</a>`);
                return `__LINK_${links.length - 1}__`;
            });

            // 6. Возвращаем все ссылки на место
            links.forEach((html, i) => {
                res = res.replace(`__LINK_${i}__`, html);
            });

            return res;
        };
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
        const stripMd = t => {
            if (!t) return '';
            return t
                .replace(/\[(.*?)\]\(.*?\)/g, '$1') // Текстовые ссылки [текст](url) -> текст
                .replace(/(\*\*\*|\*\*|\*|__)(.*?)\1/g, '$2') // Жирный, курсив, подчеркнутый

            const hour12 = settings.timeFormat === '12h';
            if (d.toDateString() === n.toDateString()) {

            },
            get(k, d = null) {
                try {
                    // 1. Пытаемся достать с новым префиксом
                    let v = localStorage.getItem('gito_' + k);
                    
                    // 2. Если нет, ищем старые данные (миграция)
                    if (!v) {

                            this.set(k, v.startsWith('{') || v.startsWith('[') ? JSON.parse(v) : v);

                        }
                    }

                    if (!v) return d;
                    try { return JSON.parse(v) } catch { return v }
                } catch(e) {
                    console.warn('Store.get failed', e);
                    return d;
                }
            },
            clear() {

            _ext(n) {

                const p = n.split('.');
                return p.length > 1 ? p.pop().toLowerCase() : '';
            },
            isImage(n) { return this.images.includes(this._ext(n)) },
