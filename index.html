                            await this.gh.saveFile({ messages: this.msgs });
                            this.lastSig = ''; this.fullRender(); this.renderChats(); break;
                        } catch {
                            if (i === 4) this.toast(t('send_error'), 'error');
                            await sleep(500);
                        }
                    }
                    btn.disabled = false; input.focus(); return;
                }

                // Загрузка файлов на GitHub
                let fRefs = [];
                if (hasF) {
                    const files = [...this.pendingFiles]; this.clearFiles();
                    $('uploadOverlay').classList.add('active');
                    for (const f of files) {
                        $('uploadName').textContent = f.name;
                        try {
                            const ext = f.name.includes('.') ? f.name.split('.').pop() : 'bin';
                            const fp = `gitogram_files/${uid()}.${ext}`;
                            // Шифруем содержимое файла перед загрузкой
                            const encrypted = Enc.encrypt(f.base64, this.curChat.key);
                            // GitHub API ожидает base64, поэтому кодируем зашифрованную строку
                            const encB64 = btoa(unescape(encodeURIComponent(encrypted)));
                            await this.gh.upload(fp, encB64);
                            fRefs.push({ n: f.name, p: fp, t: f.mime, sz: f.size, enc: true });
                        } catch (e) { console.error(e); this.toast(t('upload_error'), 'error') }
                    }
                    $('uploadOverlay').classList.remove('active');
                }

                // Создание нового сообщения
                const p = { s: this.username };
                if (text) p.m = text;
                if (fRefs.length) p.f = fRefs;
                if (this.replyTo) p.r = this.replyTo.id;
                this.cancelAction();

                const enc = Enc.encrypt(JSON.stringify(p), this.curChat.key);
                const nm = { id: uid(), ch: this.curChat.id, d: enc, t: Date.now(), pending: true };

                // Добавляем сообщение локально для мгновенного отображения со значком часов
                this.msgs.push(nm);
                this.smartUpdate();

                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await this.gh.getFile();
                        const data = (res && res.data) ? res.data : { messages: [] };
                        if (!data.messages) data.messages = [];
                        
                        // Удаляем наше временное сообщение перед сохранением на сервер (оно там появится как обычное)
                        const serverMsg = { id: nm.id, ch: nm.ch, d: nm.d, t: nm.t };
                        data.messages.push(serverMsg);
                        
                        const tr = data.messages.length > 2000 ? data.messages.slice(-2000) : data.messages;
                        await this.gh.saveFile({ messages: tr }, null, res ? res.sha : null);
                        
                        // После успешной отправки обновляем список сообщений
                        this.msgs = tr; 
                        Store.set('lastRead_' + this.curChat.id, Date.now());
                        this.lastSig = this.getSig(); 
                        this.smartUpdate(); 
                        this.renderChats(); 
                        setTimeout(() => this.fetchMessages(), 2000); // Увеличили задержку проверки после отправки
                        break;
                    } catch (e) {
                        if (i === 4) { 
                            this.toast(t('send_error'), 'error'); 
                            input.value = text;
                            // Удаляем зависшее сообщение из локального списка при ошибке
                            this.msgs = this.msgs.filter(m => m.id !== nm.id);
                            this.smartUpdate();
                        }
                        await sleep(500 + Math.random() * 1000);
                    }
                }
                btn.disabled = false; input.focus();
            }

            /**
             * Вспомогательные методы (UI Helpers)
             */
            async openLB(path) {
                try {
                    const url = await this.getUrl(path);
                    $('lightboxContent').innerHTML = `<img src="${url}">`;
                    $('lightboxDl').href = url;
                    $('lightboxDl').download = path.split('/').pop();
                    $('lightbox').classList.add('active');
                } catch { }
            }

            closeLightbox() {
                $('lightbox').classList.remove('active');
                $('lightboxContent').innerHTML = '';
            }

            async dl(path, name) {
                try {
                    const url = await this.getUrl(path);
                    const a = document.createElement('a'); a.href = url; a.download = name;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch { }
            }

            autoResize(el) {
                el.style.height = 'auto';
                el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            }

            showKey() {
                if (!this.curChat) return;
                const kn = $('keyName'), kv = $('keyValue'), kc = $('keyChannel');
                if (kn) kn.textContent = this.curChat.name;
                if (kv) kv.textContent = this.curChat.key;
                if (kc) kc.textContent = this.curChat.id;
                this.openModal('modalShowKey');
            }

            inviteChat() {
                if (!this.curChat) return;
                const inviteData = {
                    chat: {
                        name: this.curChat.name,
                        key: this.curChat.key
                    }
                };
                const inviteStr = `gitogram:addchat${JSON.stringify(inviteData)}`;
                navigator.clipboard.writeText(inviteStr).then(() => {
                    this.toast('Приглашение скопировано в буфер обмена', 'success');
                }).catch(() => {
                    this.toast('Ошибка копирования', 'error');
                });
            }

            copyKey() {
                if (!this.curChat) return;
                navigator.clipboard.writeText(this.curChat.key).then(() => {
                    $('btnCopyKey').textContent = t('copied');
                    setTimeout(() => $('btnCopyKey').textContent = '📋', 2000);
                });
            }

            /**
             * Управление настройками
             */
            openSettings() {
                $('setUsername').value = this.username;
                const ap = $('settingsAvatarPreview');
                if (this.userAvatar) {
                    ap.style.backgroundImage = `url(${this.userAvatar})`;
                    ap.textContent = '';
                } else {
                    ap.style.backgroundImage = '';
                    ap.textContent = this.username[0].toUpperCase();
                    ap.style.background = '#2b5278';
                }
                const toggleEnterSend = $('toggleEnterSend');
                if (toggleEnterSend) {
                    toggleEnterSend.classList.toggle('on', settings.enterSend);
                    toggleEnterSend.onclick = e => { e.stopPropagation(); toggleEnterSend.classList.toggle('on') };
                }

                // Выбор шрифта
                $('fontPicker').querySelectorAll('[data-fnt]').forEach(el => {
                    el.classList.toggle('active', el.dataset.fnt === settings.fontSize);
                    el.onclick = e => {
                        e.stopPropagation();
                        $('fontPicker').querySelectorAll('[data-fnt]').forEach(x => x.classList.remove('active'));
                        el.classList.add('active');
                    }
                });

                // Формат времени
                const tfPicker = $('timeFormatPicker');
                if (tfPicker) {
                    const tfOpt = tfPicker.querySelector(`[data-tf="${settings.timeFormat || '24h'}"]`);
                    if (tfOpt) tfOpt.classList.add('active');
                    tfPicker.querySelectorAll('.theme-opt').forEach(el => {
                        el.onclick = e => {
                            e.stopPropagation();
                            tfPicker.querySelectorAll('.theme-opt').forEach(x => x.classList.remove('active'));
                            el.classList.add('active');
                        }
                    });
                }

                // Выбор языка
                $('langPicker').querySelectorAll('[data-lng]').forEach(el => {
                    el.classList.toggle('active', el.dataset.lng === settings.lang);
                    el.onclick = e => {
                        e.stopPropagation();
                        $('langPicker').querySelectorAll('[data-lng]').forEach(x => x.classList.remove('active'));
                        el.classList.add('active');
                    }
                });

                // Акцентные цвета
                const accents = ['blue', 'green', 'purple', 'red', 'orange', 'pink', 'teal', 'amber'];
                const ac = { blue: '#5288c1', green: '#43a047', purple: '#7e57c2', red: '#e53935', orange: '#fb8c00', pink: '#ec407a', teal: '#00897b', amber: '#ffb300' };
                const accentPicker = $('accentPicker');
                if (accentPicker) {
                    accentPicker.innerHTML = accents.map(a => `<div class="color-dot${settings.accent === a ? ' active' : ''}" data-acc="${a}" style="background:${ac[a]}"></div>`).join('');
                    accentPicker.querySelectorAll('.color-dot').forEach(el => {
                        el.onclick = e => {
                            e.stopPropagation();
                            accentPicker.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
                            el.classList.add('active');
                        }
                    });
                }

                // Фоновые узоры
                const bgs = [
                    { id: 'pattern', icon: '🔳' },
                    { id: 'circles', icon: '🔵' },
                    { id: 'waves', icon: '🌊' },
                    { id: 'stars', icon: '✨' },
                    { id: 'circuit', icon: '⚡' },
                    { id: 'hearts', icon: '💖' },
                    { id: 'leaves', icon: '🍃' },
                    { id: 'mountains', icon: '⛰️' },
                    { id: 'bubbles', icon: '🫧' },
                    { id: 'none', icon: '⬛' }
                ];
                const bgPicker = $('bgPicker');
                if (bgPicker) {
                    bgPicker.innerHTML = bgs.map(b => `<div class="bg-opt${settings.bg === b.id ? ' active' : ''}" data-bg="${b.id}">${b.icon}</div>`).join('');
                    bgPicker.querySelectorAll('.bg-opt').forEach(el => {
                        el.onclick = e => {
                            e.stopPropagation();
                            bgPicker.querySelectorAll('.bg-opt').forEach(x => x.classList.remove('active'));
                            el.classList.add('active');
                        }
                    });
                }

                this.openModal('modalSettings');
            }

            updateNotifStatus() {
                const el = $('notifStatus'), hint = $('notifHint');
                if (!el) return;
                if (!("Notification" in window)) {
                    el.textContent = t('notif_not_supported');
                    return;
                }
                if (!window.isSecureContext) {
                    el.textContent = t('notif_secure_required');
                    el.style.color = '#e53935';
                    if (hint) hint.style.display = 'block';
                    return;
                }
                if (hint) hint.style.display = 'none';
                const p = Notification.permission;
                if (p === 'granted') {
                    el.textContent = t('notif_granted');
                    el.style.color = '#43a047';
                } else if (p === 'denied') {
                    el.textContent = t('notif_denied');
                    el.style.color = '#e53935';
                } else {
                    el.textContent = t('notif_default');
                    el.style.color = '';
                }
            }

            async testNotification() {
                this.toast('Уведомления отключены', 'info');
             }

            playNotifySound() {
            }

            inAppNotify(sender, text, avatar = '') {
            }

            async uploadAvatar(file) {
                if (file.size > 1 * 1024 * 1024) return this.toast(t('file_too_big'), 'error');
                const r = new FileReader();
                r.onload = async () => {
                    const b64 = r.result.split(',')[1];
                    const ext = file.name.split('.').pop();
                    const path = `gitogram_avatars/${this.username}_${uid()}.${ext}`;
                    try {
                        this.toast(t('uploading'), 'wait');
                        await this.gh.upload(path, b64);
                        
                        // Получаем прямую ссылку (через GitHub raw)
                        const rawUrl = `https://raw.githubusercontent.com/${this.gh.owner}/${this.gh.repo}/master/${path}`;
                        this.userAvatar = rawUrl;
                        Store.set('userAvatar', rawUrl);
                        $('settingsAvatarPreview').style.backgroundImage = `url(${rawUrl})`;
                        $('settingsAvatarPreview').textContent = '';
                        this.updateProfileOnServer(); // Синхронизируем аватарку с GitHub
                        this.toast(t('settings_saved'), 'success');
                    } catch (e) {
                        this.toast(t('upload_error'), 'error');
                    }
                };
                r.readAsDataURL(file);
            }

            saveSettings() {
                const unInput = $('setUsername');
                const nn = unInput ? unInput.value.trim() : '';
                if (nn && nn !== this.username) {
                    this.username = nn; Store.set('username', nn);
                    this.updateSidebarUser();
                }

                const getVal = (parentId, selector, dataKey) => {
                    const parent = $(parentId);
                    if (!parent) return null;
                    return parent.querySelector(selector)?.dataset[dataKey];
                };

                settings.accent = getVal('accentPicker', '.active', 'acc') || settings.accent || 'blue';
                settings.bg = getVal('bgPicker', '.active', 'bg') || settings.bg || 'pattern';
                settings.fontSize = getVal('fontPicker', '.active', 'fnt') || settings.fontSize || 'normal';
                settings.lang = getVal('langPicker', '.active', 'lng') || settings.lang || 'ru';
                
                const tfPicker = $('timeFormatPicker');
                if (tfPicker) settings.timeFormat = tfPicker.querySelector('.active')?.dataset.tf || '24h';
                
                const toggleEnterSend = $('toggleEnterSend');
                if (toggleEnterSend) settings.enterSend = toggleEnterSend.classList.contains('on');

                Store.set('settings', settings);
                Store.set('userAvatar', this.userAvatar);
                
                this.updateProfileOnServer(); // Сохраняем в облако ПОСЛЕ обновления настроек
                
                this.applySettings();
                this.closeModal('modalSettings');
                this.toast(t('settings_saved'), 'success');
                this.renderChats();
            }

            async updateProfileOnServer() {
                try {
                    if (!this.gh || !this.username) return;
                    const res = await this.gh.getFile('profiles.json');
                    let profiles = res ? res.data || {} : {};
                    
                    if (!profiles[this.username]) profiles[this.username] = {};
                    
                    // Сохраняем аватарку и список чатов (метаданные + ключи для восстановления)
                    profiles[this.username].avatar = this.userAvatar;
                    profiles[this.username].chats = this.chats;
                    profiles[this.username].settings = settings;
                    
                    await this.gh.saveFile(profiles, 'profiles.json', res ? res.sha : null);
                } catch (e) { console.error('Failed to sync profile to GitHub', e) }
            }

            /**
             * Модальные окна и Тосты
             */
            openModal(id) {
                const el = $(id);
                if (!el) return;
                el.classList.add('active');
                const i = el.querySelector('input');
                if (i) setTimeout(() => i.focus(), 100);
            }

            closeModal(id) { 
                const el = $(id);
                if (el) el.classList.remove('active');
            }

            toast(msg, type = '', dur = 2500) {
                const el = $('toast'); el.textContent = msg; el.className = 'toast show ' + type;
                clearTimeout(this._tt);
                this._tt = setTimeout(() => el.classList.remove('show'), dur);
            }
        }

        // Запуск приложения
        window.onerror = (msg, url, line) => {
            console.error('Global Error:', msg, 'at', url, ':', line);
            if (window.app) app.toast('Критическая ошибка: ' + msg, 'error');
        };
        window.onunhandledrejection = e => {
            console.error('Unhandled Promise Rejection:', e.reason);
            if (window.app) app.toast('Ошибка сети или сервера', 'error');
        };
        const app = new Gitogram();
        window.app = app;
    </script>
</body>
</html>
